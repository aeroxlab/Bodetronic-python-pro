<head>
  <meta charset="UTF-8">

  <title>Bodetronic Python Pro</title>
  <style>
    :root{
      --p:#00A6A6; --g:#22c55e; --s:#0F172A; --bg:#ECFEFF; --card:#ffffff;

    button{border:0;border-radius:18px;padding:12px 16px;font-weight:900;cursor:pointer;font-size:15px}
    input,select,textarea{width:100%;border:1px solid var(--line);border-radius:16px;padding:13px;margin:6px 0 12px;background:#fff;font-size:16px}
    textarea{min-height:90px}
    label{font-weight:900;display:block;margin-top:6px}
    .btn{background:#e8eef5;color:var(--text)} .primary{background:linear-gradient(135deg,var(--p),#22c55e);color:white}
    .dark{background:var(--s);color:white}.red{background:var(--danger);color:white}.orange{background:var(--warn);color:white}.green{background:#22c55e;color:white}
    .ghost{background:#eff6ff;color:#0f172a}.small{padding:8px 11px;font-size:13px;border-radius:12px}.full{width:100%}
    .hide{display:none!important}.muted{color:var(--muted)}.price{font-size:34px;font-weight:1000;color:var(--p);line-height:1}
    .login-wrap{min-height:100vh;display:grid;place-items:center;padding:22px;background:radial-gradient(circle at 20% 20%,#d7fff7,transparent 28%),var(--bg)}
    .login-card{width:min(470px,94vw);background:white;border:1px solid var(--line);border-radius:28px;padding:28px;box-shadow:0 26px 70px rgba(15,23,42,.12)}
    .brand{display:flex;gap:16px;align-items:center}.logo{width:70px;height:70px;border-radius:22px;background:linear-gradient(135deg,var(--p),#22c55e);color:white;display:grid;place-items:center;font-size:36px;font-weight:1000;overflow:hidden}.logo img{width:100%;height:100%;object-fit:cover}
    .brand h1{font-size:44px;margin:0}.brand p{margin:5px 0 0;color:var(--muted)}
    .layout{display:grid;grid-template-columns:290px 1fr;min-height:100vh}.sidebar{background:var(--s);color:white;padding:18px;position:sticky;top:0;height:100vh;overflow:auto}.sidebar h2{margin:0 0 4px}.sidebar small{color:#9fb6c8}
    .nav-title{font-size:12px;letter-spacing:3px;color:#69e8dd;margin:22px 0 10px}.nav-btn{display:flex;align-items:center;gap:10px;width:100%;background:transparent;color:#dbeafe;text-align:left;margin:4px 0;padding:13px;border-radius:14px}.nav-btn.active,.nav-btn:hover{background:rgba(0,166,166,.22);box-shadow:inset 3px 0 0 var(--p)}
    .main{min-width:0}.topbar{height:84px;background:white;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;padding:14px 24px;position:sticky;top:0;z-index:4}.hamb{display:none}.topbar h2{margin:0}.topbar p{margin:2px 0 0;color:var(--muted)}.spacer{flex:1}
    .page{padding:22px;max-width:1300px;margin:auto}.card{background:white;border:1px solid var(--line);border-radius:var(--radius);padding:24px;margin:14px 0;box-shadow:0 14px 38px rgba(15,23,42,.07)}.soft{background:rgba(255,255,255,.75);backdrop-filter:blur(10px)}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.stats{font-size:38px;font-weight:1000;color:var(--p);margin-top:8px}.pill{display:inline-flex;gap:6px;align-items:center;border-radius:999px;padding:7px 12px;background:#e8f8f8;color:#075e65;font-weight:900;margin:4px}
    .list-card{border:1px solid var(--line);border-radius:20px;padding:18px;margin:12px 0;background:#fff}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}.product{display:grid;grid-template-columns:92px 1fr;gap:16px;align-items:start;border:1px solid var(--line);border-radius:22px;padding:16px;margin:12px 0;background:white}.pimg{width:92px;height:92px;border-radius:18px;background:#e8eef5;display:grid;place-items:center;color:#64748b;font-weight:1000;overflow:hidden}.pimg img{width:100%;height:100%;object-fit:cover}
    table{width:100%;border-collapse:collapse}th,td{padding:10px;border-bottom:1px solid #e5e7eb;text-align:left}.total-box{background:#ecfeff;border:1px solid #b7f1ef;border-radius:20px;padding:18px;margin:10px 0}
    .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#0f172a;color:white;padding:13px 18px;border-radius:16px;box-shadow:0 18px 40px #0004;z-index:20;max-width:90vw}.toast.bad{background:#7f1d1d}.toast.ok{background:#065f46}
    .loading{position:fixed;inset:0;display:none;place-items:center;background:rgba(236,254,255,.78);backdrop-filter:blur(8px);z-index:30}.loading.show{display:grid}.spinner{width:76px;height:76px;border-radius:50%;border:12px solid #c9fff5;border-top-color:var(--p);animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.loading h3{text-align:center}
    .modal{position:fixed;inset:0;background:rgba(15,23,42,.58);display:none;align-items:center;justify-content:center;z-index:25;padding:18px}.modal.show{display:flex}.modal-box{width:min(720px,96vw);max-height:88vh;overflow:auto;background:white;border-radius:28px;padding:24px;box-shadow:0 26px 80px rgba(0,0,0,.3)}
    .qr-carousel{display:flex;gap:16px;overflow:auto;padding:12px 0;scroll-snap-type:x mandatory}.qr-card{min-width:280px;border:1px solid var(--line);border-radius:22px;padding:18px;background:#fff;scroll-snap-align:start;box-shadow:0 14px 34px rgba(15,23,42,.08)}.qr-card img{width:100%;max-height:280px;object-fit:contain;border-radius:18px;background:#f8fafc;border:1px solid var(--line)}.qr-big{display:grid;place-items:center;text-align:center}.qr-big img{width:min(420px,86vw);max-height:60vh;object-fit:contain;border-radius:24px;background:#fff;border:1px solid var(--line);padding:10px}.qr-crop-box{border:1px dashed var(--p);border-radius:18px;background:#f8ffff;padding:12px;margin:8px 0}.qr-crop-box img{width:220px;max-width:100%;height:220px;object-fit:cover;border-radius:18px;border:1px solid var(--line);display:block;margin:auto}.compare-img{width:100%;max-height:260px;object-fit:contain;border-radius:18px;border:1px solid var(--line);background:#f8fafc}
    .ad-card img,.ad-card video{width:100%;max-height:220px;object-fit:cover;border-radius:18px}.preview{border:1px dashed var(--p);border-radius:20px;padding:16px;margin-top:10px}

    .photo-box{border:1px solid var(--line);border-radius:16px;padding:12px;background:#f8fafc;margin:8px 0}.photo-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-top:10px}.photo-item{border:1px solid var(--line);border-radius:16px;padding:8px;background:white;text-align:center}.photo-item img{width:100%;height:88px;object-fit:cover;border-radius:12px}.photo-item b{display:block;font-size:12px;margin-top:4px}.ad-ticker{position:relative;overflow:hidden;border-radius:18px;margin:12px 0;border:1px solid var(--line);white-space:nowrap}.ad-ticker .track{display:inline-block;padding:12px 18px;animation:marquee var(--ad-speed,18s) linear infinite}.ad-ticker:hover .track{animation-play-state:paused}.ad-lower{border-radius:16px;margin:12px 0;padding:10px 14px;font-weight:900;box-shadow:0 12px 32px rgba(15,23,42,.12)}.ad-float{position:fixed;right:18px;bottom:18px;z-index:12;width:min(320px,calc(100vw - 28px));max-height:70vh;overflow:auto;border-radius:18px;padding:14px;box-shadow:0 18px 50px rgba(0,0,0,.25)}
.ad-float,.ad-card,.ad-lower,.ad-ticker{position:relative;word-break:break-word;overflow-wrap:anywhere}
.ad-card{max-width:100%;overflow:hidden}.ad-card h3,.ad-card p{max-width:100%;overflow-wrap:anywhere}
.ad-media{max-width:100%;max-height:55vh;border-radius:14px;display:block;object-fit:cover}
.ad-float .ad-media{width:100%;max-height:42vh;object-fit:cover}
.ad-close{position:absolute;top:8px;right:8px;width:32px;height:32px;border:0;border-radius:999px;background:rgba(15,23,42,.88);color:#fff;font-weight:1000;font-size:18px;line-height:32px;cursor:pointer;z-index:3}
.ad-ticker .ad-close,.ad-lower .ad-close{top:6px;right:6px;width:26px;height:26px;line-height:26px;font-size:14px}
.ad-delayed{opacity:0;transform:translateY(12px) scale(.98);pointer-events:none;transition:opacity .35s ease,transform .35s ease}
.ad-ready{opacity:1;transform:translateY(0) scale(1);pointer-events:auto}
.ad-hidden{display:none!important}.ad-preview-zone{min-height:70px;border:1px dashed var(--p);border-radius:20px;padding:14px;margin-top:12px;background:#f8ffff}.client-hero{display:flex;gap:18px;align-items:center}.hero-logo{width:86px;height:86px;border-radius:24px;background:linear-gradient(135deg,var(--p),#22c55e);display:grid;place-items:center;color:white;font-size:36px;font-weight:1000;overflow:hidden}.hero-logo img{width:100%;height:100%;object-fit:cover}.hero-chip{display:inline-block;border-radius:999px;padding:7px 10px;background:#e8f8f8;color:#075e65;font-weight:900;margin:4px}.service-mini{border:1px solid var(--line);border-radius:20px;background:white;padding:18px;box-shadow:0 10px 28px rgba(15,23,42,.06)}
    @keyframes marquee{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}

    @media(max-width:860px){.layout{grid-template-columns:1fr}.sidebar{position:fixed;left:-310px;top:0;width:290px;z-index:10;transition:.25s}.sidebar.open{left:0}.hamb{display:inline-block}.grid,.grid2{grid-template-columns:1fr}.topbar{padding:10px 14px}.page{padding:14px}.brand h1{font-size:36px}.product{grid-template-columns:1fr}.pimg{width:120px;height:120px}.ad-float{right:10px;left:10px;bottom:12px;width:auto;max-width:none;max-height:62vh;padding:12px}.ad-media{max-height:38vh}.ad-card,.ad-lower,.ad-ticker{max-width:100%}.ad-card h3{font-size:20px}.ad-card p,.ad-lower,.ad-ticker{font-size:14px!important}}
  
/* ===== FIX RESPONSIVE HEADER / MOBILE TITLES ===== */
.topbar,
.page-head,
.app-head,
.admin-head,
.client-head,
.header,
.shell-head {
  min-width: 0 !important;
  max-width: 100% !important;
  overflow: hidden !important;
}

.topbar h1,
.topbar h2,
.page-head h1,
.page-head h2,
.app-head h1,
.app-head h2,
.admin-head h1,
.admin-head h2,
.client-head h1,
.client-head h2,
.header h1,
.header h2,
.shell-head h1,
.shell-head h2,
.title,
.subtitle {
  max-width: 100% !important;
  min-width: 0 !important;
  overflow-wrap: anywhere !important;
  word-break: break-word !important;
  hyphens: auto !important;
  line-height: 1.05 !important;
}

.topbar p,
.page-head p,
.app-head p,
.admin-head p,
.client-head p,
.header p,
.shell-head p,
.subtitle,
.muted {
  max-width: 100% !important;
  overflow-wrap: anywhere !important;
  word-break: break-word !important;
  line-height: 1.15 !important;
}

@media (max-width: 760px) {
  body {
    overflow-x: hidden !important;
  }

  .layout,
  .app,
  .admin-layout,
  .client-layout,
  .main,
  main {
    max-width: 100vw !important;
    overflow-x: hidden !important;
  }

  .topbar,
  .page-head,
  .app-head,
  .admin-head,
  .client-head,
  .header,
  .shell-head {
    display: grid !important;
    grid-template-columns: auto minmax(0, 1fr) auto !important;
    align-items: center !important;
    gap: 10px !important;
    padding: 14px 14px !important;
  }

  .topbar > div,
  .page-head > div,
  .app-head > div,
  .admin-head > div,
  .client-head > div,
  .header > div,
  .shell-head > div {
    min-width: 0 !important;
    max-width: 100% !important;
  }

  .topbar h1,
  .topbar h2,
  .page-head h1,
  .page-head h2,
  .app-head h1,
  .app-head h2,
  .admin-head h1,
  .admin-head h2,
  .client-head h1,
  .client-head h2,
  .header h1,
  .header h2,
  .shell-head h1,
  .shell-head h2 {
    font-size: clamp(22px, 8vw, 38px) !important;
    white-space: normal !important;
    display: block !important;
  }

  .topbar p,
  .page-head p,
  .app-head p,
  .admin-head p,
  .client-head p,
  .header p,
  .shell-head p,
  .subtitle {
    font-size: clamp(14px, 5vw, 24px) !important;
    white-space: normal !important;
    display: block !important;
  }

  .card h1,
  .card h2,
  .modal h1,
  .modal h2 {
    font-size: clamp(28px, 9vw, 52px) !important;
    line-height: 1.08 !important;
    overflow-wrap: anywhere !important;
    word-break: break-word !important;
  }

  .card,
  .panel,
  .box,
  .form-card {
    max-width: calc(100vw - 24px) !important;
    overflow: hidden !important;
  }

  button,
  .btn,
  .primary,
  .dark {
    max-width: 100% !important;
    white-space: normal !important;
  }
}

@media (max-width: 430px) {
  .topbar,
  .page-head,
  .app-head,
  .admin-head,
  .client-head,
  .header,
  .shell-head {
    gap: 8px !important;
    padding: 12px 10px !important;
  }

  .topbar h1,
  .topbar h2,
  .page-head h1,
  .page-head h2,
  .app-head h1,
  .app-head h2,
  .admin-head h1,
  .admin-head h2,
  .client-head h1,
  .client-head h2,
  .header h1,
  .header h2,
  .shell-head h1,
  .shell-head h2 {
    font-size: clamp(20px, 7vw, 30px) !important;
  }

  .topbar p,
  .page-head p,
  .app-head p,
  .admin-head p,
  .client-head p,
  .header p,
  .shell-head p,
  .subtitle {
    font-size: clamp(13px, 4.3vw, 18px) !important;
  }

  .card h1,
  .card h2,
  .modal h1,
  .modal h2 {
    font-size: clamp(25px, 8vw, 42px) !important;
  }
}


/* FIX: ocultar tarjetas informativas de servicios en inicio del cliente.
   Los permisos siguen funcionando por menú y validación interna. */
.client-home-services-hidden,
.service-mini.only-internal {
  display: none !important;
}



/* ===== FIX FINAL: header móvil con botón Salir visible ===== */
@media (max-width: 760px) {
  .topbar {
    height: auto !important;
    min-height: 72px !important;
    display: grid !important;
    grid-template-columns: 58px minmax(0, 1fr) 82px !important;
    gap: 8px !important;
    align-items: center !important;
    padding: 10px 8px !important;
    width: 100% !important;
    overflow: visible !important;
  }

  .topbar .hamb {
    grid-column: 1 !important;
    width: 58px !important;
    min-width: 58px !important;
    height: 58px !important;
    padding: 0 !important;
    display: grid !important;
    place-items: center !important;
    border-radius: 18px !important;
    font-size: 24px !important;
  }

  .topbar > div:not(.spacer) {
    grid-column: 2 !important;
    min-width: 0 !important;
    max-width: 100% !important;
    overflow: hidden !important;
  }

  .topbar .spacer {
    display: none !important;
  }

  .topbar > button.dark {
    grid-column: 3 !important;
    width: 78px !important;
    min-width: 78px !important;
    max-width: 78px !important;
    padding: 12px 8px !important;
    border-radius: 18px !important;
    font-size: 15px !important;
    justify-self: end !important;
    white-space: nowrap !important;
    overflow: hidden !important;
  }

  .topbar h2 {
    font-size: clamp(24px, 7vw, 34px) !important;
    line-height: 1.05 !important;
    margin: 0 !important;
    white-space: nowrap !important;
    overflow: hidden !important;
    text-overflow: ellipsis !important;
    word-break: normal !important;
  }

  .topbar p {
    font-size: clamp(13px, 4vw, 18px) !important;
    line-height: 1.1 !important;
    margin: 2px 0 0 !important;
    white-space: nowrap !important;
    overflow: hidden !important;
    text-overflow: ellipsis !important;
    word-break: normal !important;
  }

  .page {
    padding-top: 12px !important;
  }
}

@media (max-width: 380px) {
  .topbar {
    grid-template-columns: 52px minmax(0, 1fr) 72px !important;
    gap: 6px !important;
    padding: 9px 6px !important;
  }
  .topbar .hamb {
    width: 52px !important;
    min-width: 52px !important;
    height: 52px !important;
  }
  .topbar > button.dark {
    width: 70px !important;
    min-width: 70px !important;
    max-width: 70px !important;
    font-size: 14px !important;
    padding: 10px 6px !important;
  }
  .topbar h2 {
    font-size: clamp(22px, 6.5vw, 30px) !important;
  }
  .topbar p {
    font-size: clamp(12px, 3.8vw, 16px) !important;
  }
}


/* ===== PATCH: publicidad ajustable en footer/banner sin pantalla completa ===== */
.ad-footer-slot{
  display:grid;
  grid-template-columns:minmax(80px,180px) 1fr;
  align-items:center;
  gap:14px;
  border-radius:18px;
  margin:12px 0;
  padding:12px 14px;
  border:1px solid var(--line);
  box-shadow:0 12px 32px rgba(15,23,42,.12);
  cursor:pointer;
}
.ad-footer-slot .ad-media{
  width:100%;
  height:clamp(76px,18vw,150px);
  max-height:150px;
  object-fit:var(--ad-fit,contain);
  background:rgba(255,255,255,.10);
}
.ad-card .ad-media,
.ad-lower .ad-media,
.ad-ticker .ad-media{
  object-fit:var(--ad-fit,cover);
}
.ad-video-frame{
  width:100%;
  max-width:100%;
  border-radius:18px;
  overflow:hidden;
  background:#020617;
}
.ad-video-frame video,
.ad-video-frame img{
  width:100%;
  max-height:clamp(120px,34vh,360px);
  object-fit:var(--ad-fit,contain);
}
.scanner-actions{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:12px;
  margin:12px 0;
}
.camera-box{
  border:1px solid var(--line);
  border-radius:22px;
  padding:14px;
  background:#f8ffff;
  margin:12px 0;
}
.camera-box video{
  width:100%;
  max-height:380px;
  object-fit:cover;
  border-radius:18px;
  background:#0f172a;
}
.edit-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(190px,1fr));
  gap:12px;
}
@media(max-width:760px){
  .ad-footer-slot{grid-template-columns:1fr}
  .ad-footer-slot .ad-media{height:160px;max-height:160px}
  .scanner-actions{grid-template-columns:1fr}
}


.edit-photo-preview{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:10px;
}
.edit-photo-preview img{
  width:86px;
  height:86px;
  object-fit:cover;
  border-radius:16px;
  border:1px solid var(--line);
  background:#fff;
}
.suggestion-card{
  border:1px solid var(--line);
  border-radius:18px;
  padding:12px;
  margin-top:10px;
}


.detect-popup-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}
.detect-popup-img{
  width:100%;
  max-height:360px;
  object-fit:contain;
  border-radius:18px;
  border:1px solid var(--line);
  background:#fff;
}
.detect-score{
  display:inline-flex;
  align-items:center;
  gap:6px;
  border-radius:999px;
  padding:8px 12px;
  font-weight:900;
  background:#ecfeff;
  color:#0f766e;
  margin:6px 0;
}
.detect-small-list{
  max-height:280px;
  overflow:auto;
}
@media(max-width:760px){
  .detect-popup-grid{grid-template-columns:1fr}
  .detect-popup-img{max-height:300px}
}


.photo-thumb{
  position:relative;
  width:86px;
  height:86px;
  border-radius:16px;
  overflow:hidden;
  border:1px solid var(--line);
  background:#fff;
}
.photo-thumb img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.photo-x{
  position:absolute;
  top:4px;
  right:4px;
  width:26px;
  height:26px;
  border:0;
  border-radius:999px;
  background:rgba(239,68,68,.95);
  color:#fff;
  font-weight:900;
  line-height:1;
  cursor:pointer;
  box-shadow:0 6px 16px rgba(0,0,0,.25);
}
.photo-main-badge{
  position:absolute;
  left:4px;
  bottom:4px;
  font-size:10px;
  background:rgba(15,23,42,.78);
  color:#fff;
  border-radius:999px;
  padding:3px 6px;
}


/* ===== V8 Scanner en vivo: cámara, código y pitido ===== */
.scan-panel-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:14px}
.scan-option{border:1px solid var(--line);border-radius:28px;padding:18px;background:#fff;box-shadow:0 16px 35px rgba(15,23,42,.06)}
.scan-option h2{margin:0 0 8px;font-size:clamp(26px,5vw,42px)}
.scan-option p{margin:0 0 14px;color:#6b7280}
.scanner-overlay{position:fixed;inset:0;background:rgba(15,23,42,.74);backdrop-filter:blur(8px);z-index:120;display:flex;align-items:center;justify-content:center;padding:18px}
.scanner-sheet{width:min(760px,96vw);max-height:92vh;overflow:auto;background:#fff;border-radius:34px;padding:18px;box-shadow:0 30px 90px rgba(0,0,0,.35);border:1px solid rgba(0,166,166,.22)}
.scanner-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px}
.scanner-head h2{margin:0;font-size:clamp(22px,5vw,38px)}
.scanner-video-wrap{position:relative;border-radius:26px;overflow:hidden;background:#020617;min-height:280px;border:2px solid rgba(0,166,166,.35);box-shadow:0 0 0 6px rgba(0,166,166,.06), inset 0 0 60px rgba(0,166,166,.18)}
.scanner-video-wrap video{width:100%;height:min(62vh,520px);object-fit:cover;display:block}
.scan-frame{position:absolute;inset:12%;border:3px solid rgba(34,211,238,.92);border-radius:24px;box-shadow:0 0 24px rgba(34,211,238,.85), inset 0 0 24px rgba(34,211,238,.32);pointer-events:none;animation:scanPulse 1.4s infinite}
.scan-line{position:absolute;left:12%;right:12%;height:3px;top:16%;background:linear-gradient(90deg,transparent,#22d3ee,transparent);box-shadow:0 0 18px #22d3ee;animation:scanLine 1.55s linear infinite;pointer-events:none}
.scan-status{font-weight:900;color:#0f766e;background:#ecfeff;border-radius:999px;padding:10px 14px;margin:12px 0;display:inline-flex;align-items:center;gap:8px}
.scan-status::before{content:'●';animation:scanBlink 1s infinite;color:#10b981}.barcode-field{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:end}.barcode-field button{white-space:nowrap}
@keyframes scanPulse{0%,100%{opacity:.85;transform:scale(1)}50%{opacity:1;transform:scale(1.015)}}
@keyframes scanLine{0%{top:14%}100%{top:84%}}
@keyframes scanBlink{0%,100%{opacity:.25}50%{opacity:1}}
@media(max-width:760px){.scan-panel-grid{grid-template-columns:1fr}.scanner-sheet{border-radius:28px;padding:14px}.scanner-video-wrap{min-height:240px}.barcode-field{grid-template-columns:1fr}.barcode-field button{width:100%}}

<script>
let TOKEN="", ROLE="", CLIENT=null, ADMIN_DATA=null, BUNDLE=null, PRODUCTS=[], CART=[], CURRENT_CREDIT=null, PAYMENT_CACHE=[], QR_FILE=null;
const SERVICE_LABELS={
  bodega:"Bodega", bodega_pos:"Bodega - Punto de venta", bodega_credits:"Bodega - Créditos/Cuentas", bodega_expirations:"Bodega - Vencimientos",
  minimarket:"Minimarket", minimarket_pos:"Minimarket - Punto de venta", minimarket_credits:"Minimarket - Créditos/Cuentas", minimarket_expirations:"Minimarket - Vencimientos",
  almacen:"Almacén", almacen_picking:"Almacén - Picking", almacen_pos:"Almacén - Punto de venta"
};

function el(id){return document.getElementById(id)}
function money(n){return "S/ "+Number(n||0).toFixed(2)}
function safe(s){return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]))}
function showLoad(t="Cargando..."){el("loadingText").textContent=t;el("loading").classList.add("show")}
function hideLoad(){el("loading").classList.remove("show")}
function toast(t,type="ok"){const x=el("toast");x.textContent=t;x.className="toast "+type;setTimeout(()=>x.classList.add("hide"),2800)}
function modal(html){el("modalContent").innerHTML=html;el("modal").classList.add("show")}
function closeModal(){el("modal").classList.remove("show")}
function confirmBox(title,msg,yes){modal(`<h2>${safe(title)}</h2><p>${safe(msg)}</p><div class="actions"><button class="red" onclick="closeModal()">${"Cancelar"}</button><button class="primary" onclick="closeModal();${yes}">${"Confirmar"}</button></div>`)}
function toggleMenu(){el("sidebar").classList.toggle("open")}
function setTitle(t,s=""){el("pageTitle").textContent=t;el("pageSub").textContent=s||"Bodetronic CRM | AeroxLab"; if(innerWidth<860) el("sidebar").classList.remove("open")}
async function api(path,opts={}){
  opts.headers=opts.headers||{};
  if(!(opts.body instanceof FormData)) opts.headers["Content-Type"]="application/json";
  if(TOKEN) opts.headers.Authorization="Bearer "+TOKEN;
  const r=await fetch(path,opts);
  const ct=r.headers.get("content-type")||"";
  if(ct.includes("application/json")) return await r.json();
  return {ok:r.ok,text:await r.text()};
}
function logout(){localStorage.removeItem("BT_TOKEN");localStorage.removeItem("BT_ROLE");localStorage.removeItem("BT_CLIENT");location.reload()}
function openSupport(){window.open("https://wa.me/51992657332?text="+encodeURIComponent("Necesito soporte para mi sistema"),"_blank")}
function absUrl(u){
  if(!u)return "";
  let s=String(u);
  const full=s.startsWith("/")?location.origin+s:s;
  if(full.includes("/uploads/")){
    const sep=full.includes("?")?"&":"?";
    return full+sep+"v="+Date.now();
  }
  return full;
}
function waNumber(n){let x=String(n||"").replace(/\D/g,""); if(x.length===9)x="51"+x; return x}

function productName(p){
  const name=String(p?.display_name||p?.name||"").trim();
  const brand=String(p?.brand||"").trim();
  if(!brand || name.toLowerCase().includes(brand.toLowerCase())) return name;
  const m=name.match(/\b\d/);
  if(m){
    const i=m.index;
    return [name.slice(0,i).trim(), brand, name.slice(i).trim()].filter(Boolean).join(" ");
  }
  return (name+" "+brand).trim();
}


function downloadFile(url,name="archivo.pdf"){
  const a=document.createElement("a");a.href=absUrl(url);a.target="_blank";a.download=name;document.body.appendChild(a);a.click();a.remove();
}
function prepareQRPreview(){
  const f=el("payFile")?.files?.[0];QR_FILE=f||null;const box=el("qrCropBox");if(!box)return;
  if(!f){box.innerHTML="";return}
  const reader=new FileReader();reader.onload=e=>{box.innerHTML=`<b>Vista del QR seleccionado</b><p class="muted">Se recortará al centro en formato cuadrado. Ajusta el zoom si necesitas.</p><img id="qrPreviewImg" src="${e.target.result}"><label>Zoom de recorte</label><input id="qrZoom" type="range" min="1" max="2.5" step="0.05" value="1">`};reader.readAsDataURL(f);
}
function cropQRBlob(file){
  return new Promise((resolve,reject)=>{const img=new Image();const reader=new FileReader();reader.onload=e=>{img.onload=()=>{const zoom=Number(el("qrZoom")?.value||1);const side=Math.min(img.width,img.height)/zoom;const sx=(img.width-side)/2, sy=(img.height-side)/2;const canvas=document.createElement("canvas");canvas.width=900;canvas.height=900;const ctx=canvas.getContext("2d");ctx.fillStyle="#fff";ctx.fillRect(0,0,900,900);ctx.drawImage(img,sx,sy,side,side,0,0,900,900);canvas.toBlob(b=>resolve(b||file),"image/png",0.95)};img.onerror=reject;img.src=e.target.result};reader.onerror=reject;reader.readAsDataURL(file)});
}

async function login(){
  showLoad("Verificando acceso...");
  try{
    const r=await api("/api/auth/login",{method:"POST",body:JSON.stringify({username:el("loginUser").value.trim(),password:el("loginPass").value.trim()})});
    if(!r.ok){el("loginMsg").innerHTML=`<div class="card" style="background:#fee2e2;color:#991b1b">${safe(r.error||"Credenciales incorrectas")}</div>`;hideLoad();return}
    TOKEN=r.token;ROLE=r.role;CLIENT=r.client||null;
    localStorage.setItem("BT_TOKEN",TOKEN);localStorage.setItem("BT_ROLE",ROLE);localStorage.setItem("BT_CLIENT",JSON.stringify(CLIENT||{}));
    el("login").classList.add("hide");el("app").classList.remove("hide");
    if(ROLE==="admin"){adminMenu(); await adminDashboard()} else {await loadClient(); clientMenu(); clientHome()}
  }catch(e){el("loginMsg").innerHTML=`<div class="card" style="background:#fee2e2;color:#991b1b">${safe(e.message)}</div>`}
  hideLoad();
}
window.addEventListener("load",async()=>{
  TOKEN=localStorage.getItem("BT_TOKEN")||"";ROLE=localStorage.getItem("BT_ROLE")||"";try{CLIENT=JSON.parse(localStorage.getItem("BT_CLIENT")||"{}")}catch(e){}
  if(TOKEN&&ROLE){el("login").classList.add("hide");el("app").classList.remove("hide"); if(ROLE==="admin"){adminMenu(); await adminDashboard()} else {await loadClient(); clientMenu(); clientHome()}}
});

function nav(items){el("menu").innerHTML=items.map(i=>`<button class="nav-btn" onclick="${i.fn}"><span>${i.icon||"•"}</span>${i.t}</button>`).join("")+`<div class="nav-title">SISTEMA</div><button class="nav-btn" onclick="logout()">Salir</button>`}
function adminMenu(){el("sideSub").textContent="Admin maestro";nav([
 {t:"Dashboard",fn:"adminDashboard()",icon:"▣"},{t:"Clientes CRM",fn:"adminClients()",icon:"▤"},{t:"Crear cliente",fn:"adminCreateClient()",icon:"+"},
 {t:"Servicios",fn:"adminServices()",icon:"◉"},{t:"Diseño sistema",fn:"adminSystemDesign()",icon:"◌"},{t:"Panel cliente",fn:"adminClientDesign()",icon:"▥"},
 {t:"Publicidad/Sponsors",fn:"adminAds()",icon:"AD"},{t:"Pagos / QR",fn:"adminPayments()",icon:"QR"},{t:"Productos / Inventario",fn:"adminProducts()",icon:"▦"},
 {t:"Ventas / POS",fn:"adminReports()",icon:"POS"},{t:"Créditos / Cuentas",fn:"adminCredits()",icon:"S/"},{t:"Vencimientos",fn:"adminExpirations()",icon:"⌚"},
 {t:"Reportes",fn:"adminReports()",icon:"◔"},{t:"Automatizaciones n8n",fn:"adminAutomation()",icon:"n8n"},{t:"Recordatorios",fn:"adminReminders()",icon:"✉"}
])}
async function refreshAdmin(){const r=await api("/api/admin/clients");ADMIN_DATA=r.clients||[];return ADMIN_DATA}
function clientOptions(){return (ADMIN_DATA||[]).map(c=>`<option value="${c.id}">${safe(c.business_name)} - ${safe(c.owner_name)}</option>`).join("")}

async function adminDashboard(){
  setTitle("Dashboard","Bodetronic CRM | AeroxLab");showLoad("Actualizando dashboard...");
  const r=await api("/api/admin/dashboard");hideLoad();
  el("view").innerHTML=`<div class="grid">
    <div class="card"><b>Clientes</b><div class="stats">${r.stats.clients}</div></div>
    <div class="card"><b>Activos</b><div class="stats">${r.stats.active}</div></div>
    <div class="card"><b>Vencidos</b><div class="stats">${r.stats.expired}</div></div>
    <div class="card"><b>Productos</b><div class="stats">${r.stats.products}</div></div>
    <div class="card"><b>Ventas</b><div class="stats">${r.stats.sales}</div></div>
    <div class="card"><b>Créditos acumulados</b><div class="stats">${money(r.stats.credits_total)}</div></div>
  </div><div class="card"><h2>Accesos rápidos</h2><div class="actions"><button class="primary" onclick="adminCreateClient()">Crear cliente</button><button class="dark" onclick="adminClients()">Ver CRM</button><button class="btn" onclick="adminAds()">Publicidad</button><button class="btn" onclick="adminAutomation()">n8n</button></div></div>`
}
async function adminClients(){
  setTitle("Clientes CRM","Revisa accesos, servicios, pagos y diseño");showLoad("Cargando CRM...");
  await refreshAdmin();hideLoad();
  el("view").innerHTML=`<div class="card"><h1>Clientes registrados</h1><button class="primary" onclick="adminClients()">Actualizar CRM</button>${ADMIN_DATA.length?ADMIN_DATA.map(clientCard).join(""):"<div class='card'>Aún no hay clientes activos.</div>"}</div>`
}
function clientCard(c){
  const activeServices=Object.entries(c.services||{}).filter(([k,v])=>v.active).map(([k])=>SERVICE_LABELS[k]||k).join(", ")||"Sin servicios";
  return `<div class="list-card">
    <h2>${safe(c.business_name)}</h2><p class="muted">${safe(c.owner_name)} | ${safe(c.whatsapp)} | ${safe(c.dni_ruc)}</p>
    <span class="pill">${safe(c.status)}</span><span class="pill">${safe(activeServices)}</span><span class="pill">Vence: ${safe(c.access_expires_at)}</span>
    <p>Usuario: <b>${safe(c.access.username)}</b> | Contraseña: <b>${safe(c.access.password)}</b></p>
    <div class="actions">
      <button class="btn" onclick="copyText('${safe(c.access.username)}')">Copiar usuario</button><button class="btn" onclick="copyText('${safe(c.access.password)}')">Copiar clave</button>
      <button class="primary" onclick="adminClientDesign(${c.id})">Diseño</button><button class="dark" onclick="adminPayments(${c.id})">Pagos</button><button class="orange" onclick="adminServices(${c.id})">Servicios</button>
      <button class="red" onclick="hideClient(${c.id})">Ocultar</button>
    </div></div>`
}
function copyText(t){navigator.clipboard?.writeText(t);toast("Copiado","ok")}
async function hideClient(id){confirmBox("Ocultar cliente","Se ocultará del CRM principal, pero se conserva su historial.",`doHideClient(${id})`)}
async function doHideClient(id){showLoad("Ocultando cliente...");await api(`/api/admin/clients/${id}/access`,{method:"PUT",body:JSON.stringify({status:"OCULTO"})});hideLoad();adminClients()}

function adminCreateClient(){
  setTitle("Crear cliente","Alta de clientes y demos");el("view").innerHTML=`<div class="card"><h1>Crear cliente / negocio</h1>
    <div class="grid2"><div><label>Negocio</label><input id="c_business" placeholder="Bodega Chebitas"></div><div><label>Dueño</label><input id="c_owner" placeholder="Nombre del dueño"></div></div>
    <div class="grid2"><div><label>DNI/RUC</label><input id="c_dni"></div><div><label>WhatsApp</label><input id="c_wsp"></div></div>
    <div class="grid2"><div><label>Usuario opcional</label><input id="c_user"></div><div><label>Contraseña opcional</label><input id="c_pass"></div></div>
    <div class="grid2"><div><label>Tipo membresía</label><select id="c_member"><option>Demo</option><option>Mensual</option><option>Anual</option><option>Indefinido</option></select></div><div><label>Duración de acceso</label><div class="grid2"><input id="c_dur_amount" type="number" placeholder="Ej: 2"><select id="c_dur_type"><option value="horas">Horas</option><option value="dias">Días</option><option value="meses">Meses</option><option value="indefinido">Indefinido</option></select></div></div></div>
    <h3>Servicios iniciales</h3><div class="grid">${Object.entries(SERVICE_LABELS).map(([k,v])=>`<label class="list-card"><input type="checkbox" id="svc_${k}"> ${v}</label>`).join("")}</div>
    <button class="primary" onclick="saveNewClient()">Guardar cliente</button></div>`
}
async function saveNewClient(){
  const services={};Object.keys(SERVICE_LABELS).forEach(k=>services[k]=el("svc_"+k)?.checked||false);
  showLoad("Creando cliente...");
  const r=await api("/api/admin/clients",{method:"POST",body:JSON.stringify({business_name:el("c_business").value,owner_name:el("c_owner").value,dni_ruc:el("c_dni").value,whatsapp:el("c_wsp").value,username:el("c_user").value,password:el("c_pass").value,membership_type:el("c_member").value,duration_amount:el("c_dur_amount").value,duration_type:el("c_dur_type").value,services})});
  hideLoad(); if(!r.ok){toast(r.error||"No se pudo crear","bad");return}
  toast(`Cliente creado. Usuario: ${r.username} | Clave: ${r.password}`,"ok"); adminClients();
}
async function adminServices(selectedId){
  setTitle("Servicios","Activar servicios y demos por tiempo");showLoad("Cargando clientes...");await refreshAdmin();hideLoad();
  const first=selectedId||ADMIN_DATA[0]?.id||"";
  el("view").innerHTML=`<div class="card"><h1>Servicios del cliente</h1><label>Cliente</label><select id="svcClient" onchange="renderServiceChecks()">${clientOptions()}</select>
  <div class="grid2"><div><label>Tiempo de activación</label><input id="svcAmount" type="number" placeholder="Ej: 3"></div><div><label>Unidad</label><select id="svcType"><option value="horas">Horas</option><option value="dias">Días</option><option value="meses">Meses</option><option value="indefinido">Indefinido</option></select></div></div>
  <label><input id="svcDemo" type="checkbox"> Activar como demo/prueba</label>
  <div id="svcChecks" class="grid"></div><button class="primary" onclick="saveServices()">Guardar servicios</button></div>`;
  el("svcClient").value=first;renderServiceChecks();
}
function renderServiceChecks(){
  const id=Number(el("svcClient").value);const c=(ADMIN_DATA||[]).find(x=>x.id===id)||{};const sm=c.services||{};
  el("svcChecks").innerHTML=Object.entries(SERVICE_LABELS).map(([k,v])=>`<label class="list-card"><input type="checkbox" id="svcu_${k}" ${sm[k]?.active?"checked":""}> ${v}<br><small class="muted">Vence: ${safe(sm[k]?.expires_at||"INDEFINIDO")}</small></label>`).join("")
}
async function saveServices(){
  const services={};Object.keys(SERVICE_LABELS).forEach(k=>services[k]=el("svcu_"+k).checked);
  showLoad("Guardando servicios...");await api(`/api/admin/clients/${el("svcClient").value}/services`,{method:"PUT",body:JSON.stringify({services,duration_amount:el("svcAmount").value,duration_type:el("svcType").value,demo:el("svcDemo").checked})});hideLoad();toast("Servicios actualizados");adminServices(Number(el("svcClient").value))
}
async function adminClientDesign(selectedId){
  setTitle("Personalizar panel cliente","Logo, colores, fondo, textos, botones y vista previa");showLoad("Cargando clientes...");await refreshAdmin();hideLoad();
  const first=selectedId||ADMIN_DATA[0]?.id||"";
  el("view").innerHTML=`<div class="card"><h1>Diseño del panel cliente</h1><p class="muted">Todo lo que guardes aquí se refleja en el panel del cliente seleccionado.</p><label>Cliente</label><select id="dClient" onchange="fillDesign()">${clientOptions()}</select>
  <div class="grid2"><div><label>Título del panel / nombre visible</label><input id="dTitle" placeholder="Ej: Bodega Chebitas"></div><div><label>Logo URL del cliente</label><input id="dLogo" placeholder="/uploads/logos/..."></div></div>
  <label>Subir logo del cliente</label><div class="muted">Este logo reemplaza el logo genérico de Bodetronic en el panel del cliente.</div><input id="dLogoFile" type="file" accept="image/*"><button class="btn" onclick="uploadDesignFile('dLogoFile','dLogo','logos')">Subir logo</button>
  <label>Imagen de fondo URL</label><input id="dBgUrl" placeholder="/uploads/fondos/... o URL externa">
  <label>Subir imagen de fondo</label><input id="dBgFile" type="file" accept="image/*"><button class="btn" onclick="uploadDesignFile('dBgFile','dBgUrl','fondos')">Subir fondo</button>
  <div class="grid"><div><label>Color principal de botones</label><input id="dPrimary" type="color"></div><div><label>Color secundario / menú</label><input id="dSecondary" type="color"></div><div><label>Color de fondo del panel</label><input id="dBg" type="color"></div></div>
  <div class="grid2"><div><label>Radio de botones/tarjetas</label><input id="dRadius" type="number" placeholder="18"></div><div><label>Tamaño de letra</label><input id="dFont" type="number" placeholder="16"></div></div>
  <label>Texto de bienvenida / banner superior</label><textarea id="dBanner" placeholder="Mensaje que verá el cliente en su inicio"></textarea>
  <label>Texto sponsor o auspiciador fijo</label><textarea id="dSponsor" placeholder="Ej: Auspiciado por..."></textarea>
  <label>Información visible del negocio</label><textarea id="dInfo" placeholder="Ej: Dueño | WhatsApp | Dirección"></textarea>
  <label>Botones/secciones visibles especiales</label><textarea id="dButtons" placeholder="Ej: productos,pos,creditos,pagos"></textarea>
  <h3>Vista previa</h3><div id="dPreview" class="preview"></div><button class="primary" onclick="saveDesign()">Guardar diseño del cliente</button></div>`;
  el("dClient").value=first;fillDesign();

function currentAdData(){return {client_id:el("adClient")?.value||null,title:el("adTitle")?.value||"",text_body:el("adText")?.value||"",media_url:el("adMedia")?.value||"",media_type:el("adType")?.value||"text",location:el("adLocation")?.value||"home",display_mode:el("adMode")?.value||"card",sponsor_name:el("adSponsor")?.value||"",link_url:el("adLink")?.value||"",width:el("adWidth")?.value||"100%",height:el("adHeight")?.value||"auto",duration_seconds:Number(el("adDur")?.value||3),entrance_style:el("adEntrance")?.value||"fade",fit_mode:el("adFit")?.value||"contain",bg_color:el("adBg")?.value||"#0F172A",text_color:el("adTextColor")?.value||"#FFFFFF",font_size:Number(el("adFont")?.value||16),speed:Number(el("adSpeed")?.value||16),active:true}}
function adPublicHtml(a){
  const txt=safe(a.text_body||a.title||'Publicidad');
  const bg=a.bg_color||'#0F172A',tc=a.text_color||'#FFFFFF',fs=a.font_size||16,sp=a.speed||16,delay=Math.max(0,Number(a.duration_seconds||3));
  const fit=a.fit_mode||'contain';
  const attrs=`data-delay="${delay}" data-link="${safe(a.link_url||'')}"`;
  const media=a.media_url?(a.media_type==='video'?`<div class="ad-video-frame"><video class="ad-media" style="--ad-fit:${fit}" src="${absUrl(a.media_url)}" controls playsinline muted loop preload="metadata"></video></div>`:`<img class="ad-media" style="--ad-fit:${fit}" src="${absUrl(a.media_url)}" loading="lazy">`):'';
  const click=a.link_url?` onclick="openAdLink(event,this)"`:'';

  if((a.display_mode||'')==='footer_banner'||a.location==='footer_banner'){
    return `<div class="ad-footer-slot ad-delayed" ${attrs}${click} style="background:${bg};color:${tc};font-size:${fs}px;width:${a.width||'100%'}">
      ${media||'<div class="pimg" style="width:100%;height:120px">AD</div>'}
      <div><b>${safe(a.title||'Publicidad')}</b><p>${txt}</p><small>${safe(a.sponsor_name||'')}</small></div>
    </div>`;
  }
  if((a.display_mode||a.location)==='ticker_bottom'||(a.location||'').includes('ticker'))
    return `<div class="ad-ticker ad-delayed" ${attrs}${click} style="background:${bg};color:${tc};font-size:${fs}px;--ad-speed:${sp}s;width:${a.width||'100%'}"><div class="track">${txt} ${a.sponsor_name?' • '+safe(a.sponsor_name):''}</div></div>`;
  if((a.display_mode||'')==='lower_third'||a.location==='footer')
    return `<div class="ad-lower ad-delayed" ${attrs}${click} style="background:${bg};color:${tc};font-size:${fs}px;width:${a.width||'100%'}">${media}${txt} ${a.sponsor_name?' • '+safe(a.sponsor_name):''}</div>`;
  if((a.display_mode||'')==='floating')
    return `<div class="ad-float ad-delayed" ${attrs}${click} style="background:${bg};color:${tc};font-size:${fs}px"><button class="ad-close" onclick="closeAd(event,this)" aria-label="Cerrar anuncio">×</button>${media}<b>${safe(a.title||'Publicidad')}</b><p>${txt}</p></div>`;
  return `<div class="card ad-card ad-delayed" ${attrs}${click} style="width:${a.width||'100%'};max-width:100%"><h3>${safe(a.title||'Publicidad')}</h3>${media}<p>${txt}</p><p class="muted">${safe(a.sponsor_name||'')}</p></div>`;
}

function handleEditMainPhoto(files){
  EDIT_MAIN_PHOTO=(files&&files[0])?files[0]:null;
  renderEditNewPhotoPreview();
}
function handleEditMorePhotos(files){
  Array.from(files||[]).forEach(f=>EDIT_EXTRA_PHOTOS.push(f));
  renderEditNewPhotoPreview();
  ["epMoreCamera","epMoreGallery"].forEach(id=>{if(el(id))el(id).value=""});
}
function renderEditNewPhotoPreview(){
  const box=el("editNewPhotoPreview");
  if(!box)return;
  let html="";
  if(EDIT_MAIN_PHOTO)html+=`<div><small>Principal nueva</small><br><img src="${URL.createObjectURL(EDIT_MAIN_PHOTO)}"></div>`;
  EDIT_EXTRA_PHOTOS.forEach((f,i)=>html+=`<div><small>Referencia ${i+1}</small><br><img src="${URL.createObjectURL(f)}"></div>`);
  box.innerHTML=html;
}
async function uploadEditProductImages(id){
  if(!EDIT_MAIN_PHOTO && !EDIT_EXTRA_PHOTOS.length)return {ok:true};
  const fd=new FormData();
  fd.append("replace_main",EDIT_MAIN_PHOTO?"true":"false");
  if(EDIT_MAIN_PHOTO)fd.append("main_image",EDIT_MAIN_PHOTO);
  EDIT_EXTRA_PHOTOS.forEach(f=>fd.append("images",f));
  return await api(`/api/products/${id}/images`,{method:"POST",body:fd});
}

}

async function saveEditProduct(id){
  const payload={
    name:el("epName").value,
    brand:el("epBrand").value,
    barcode:el("epBarcode").value,
    reference:el("epReference").value,
    category:el("epCategory").value,
    presentation:el("epPresentation").value,
    stock:el("epStock").value,
    min_stock:el("epMinStock").value,
    real_price:el("epReal").value,
    sale_price:el("epSale").value,
    expiration_date:el("epExp").value,
    notes:el("epNotes").value
  };
  showLoad("Guardando producto...");
  const r=await api(`/api/products/${id}`,{method:"PUT",body:JSON.stringify(payload)});
  if(!r.ok){hideLoad();toast(r.error||"No se pudo guardar","bad");return}
  const imgs=await uploadEditProductImages(id);

}

async function scanSearch(){

  const r=await api(`/api/products/search?client_id=${CLIENT.id}&q=${encodeURIComponent(q)}`);
  const products=r.products||[];
  el("scanResult").innerHTML=products.map(p=>`<div class="card">${productFoundHtml(p)}<div class="actions"><button class="primary" onclick="editProduct(${p.id})">Editar</button>${q?`<button class="orange" onclick="linkBarcodeToProduct(${p.id},'${safe(q)}')">Vincular código buscado</button>`:""}</div></div>`).join("")||`<div class='card'><h2>No encontrado</h2><p class="muted">Puedes crear un producto nuevo o revisar el código escrito.</p><button class="primary" onclick="newProductForm()">Crear producto</button></div>`;

async function detectImageInput(inputId){

async function detectImage(){return detectImageInput("scanCameraFile")}
function renderDetectResult(r){
  const captured=absUrl(r.captured_image);
  const left=`<div class="card"><h3>Foto tomada / cargada</h3><img class="detect-popup-img" src="${captured}"></div>`;
  let right="";
  if(r.ok&&r.similar&&r.product){
    right=`<div class="card"><h3>Producto encontrado</h3>
      <img class="detect-popup-img" src="${absUrl(r.product.matched_image_url||r.product.image_url)}">
      <div class="detect-score">Coincidencia visual: ${r.match_score??""}</div>
      ${productFoundHtml(r.product)}
      <div class="actions">
        <button class="primary" onclick="closeModal();editProduct(${r.product.id})">Editar producto</button>
        <button class="orange" onclick="closeModal();stockModal(${r.product.id})">Stock</button>
        <button class="btn" onclick="trainCapturedToProduct(${r.product.id},'${safe(r.captured_image)}')">Guardar foto como referencia</button>
      </div>
    </div>`;
  }else{
    const suggestions=(r.suggestions||[]).map(s=>{
      const p=s.product;
      return `<div class="suggestion-card">
        <h3>${safe(productName(p))}</h3>
        ${p.matched_image_url||p.image_url?`<img class="compare-img" src="${absUrl(p.matched_image_url||p.image_url)}">`:""}
        <p class="muted">Parecido visual: ${s.score}</p>
        <div class="actions">
          <button class="primary" onclick="trainCapturedToProduct(${p.id},'${safe(r.captured_image)}')">Entrenar con esta foto</button>
          <button class="btn" onclick="closeModal();editProduct(${p.id})">Editar</button>
        </div>
      </div>`;
    }).join("");
    const options=(PRODUCTS||[]).map(p=>`<option value="${p.id}">${safe(productName(p))}</option>`).join("");
    right=`<div class="card"><h2>No hay coincidencia segura</h2>
      <p class="muted">No existe coincidencia segura. Solo se confirma si coincide etiqueta, color, marca/letras y referencias del mismo producto.</p>
      ${r.match_score!=null?`<div class="detect-score">Mejor parecido: ${r.match_score}</div>`:""}
      ${suggestions?`<h3>Posibles referencias para entrenar</h3><p class="muted">No son coincidencias confirmadas.</p><div class="detect-small-list">${suggestions}</div>`:""}
      <label>Entrenar producto existente</label>
      <select id="trainProductSelect">${options}</select>
      <div class="actions">
        <button class="primary" onclick="trainCapturedToProduct(el('trainProductSelect').value,'${safe(r.captured_image)}')">Guardar como referencia</button>
        <button class="dark" onclick="closeModal();newProductForm()">Crear producto nuevo</button>
      </div>
    </div>`;
  }

  const html=`<h1>Resultado del análisis</h1>
    <div class="detect-popup-grid">${left}${right}</div>
    <div class="actions"><button class="dark" onclick="closeModal()">Cerrar</button></div>`;
  modal(html);

  // También dejamos un resumen pequeño debajo del scanner para que no se pierda.
  if(el("scanResult")){
    el("scanResult").innerHTML=`<div class="card"><h3>Último análisis</h3><img class="compare-img" src="${captured}"><p>${r.ok&&r.similar?"Producto encontrado":"Sin coincidencia segura"}</p><button class="btn" onclick='renderDetectResult(${JSON.stringify(r).replace(/'/g,"&apos;")})'>Ver resultado</button></div>`;
  }
}
async function trainCapturedToProduct(productId,imageUrl){
  if(!productId)return toast("Selecciona un producto","bad");
  showLoad("Entrenando producto...");
  const r=await api(`/api/products/${productId}/train-from-captured`,{method:"POST",body:JSON.stringify({image_url:imageUrl})});
  hideLoad();
  if(!r.ok){toast(r.error||"No se pudo entrenar","bad");return}
  toast("Foto agregada como referencia");
  await loadClient();
}

let BARCODE_STREAM=null, BARCODE_TIMER=null, LIVE_IMG_STREAM=null, LIVE_IMG_TIMER=null, LIVE_IMG_BUSY=false, LIVE_IMG_LAST=null, LIVE_IMG_REPEAT=0;
function playScanBeep(){try{const AC=window.AudioContext||window.webkitAudioContext;const ctx=new AC();const gain=ctx.createGain();gain.gain.value=0.32;gain.connect(ctx.destination);[0,105].forEach(delay=>{const osc=ctx.createOscillator();osc.type="square";osc.frequency.value=1280;osc.connect(gain);osc.start(ctx.currentTime+delay/1000);osc.stop(ctx.currentTime+delay/1000+0.09)});setTimeout(()=>ctx.close(),480)}catch(e){}}
function showScannerOverlay(html){closeScannerOverlay(false);const box=document.createElement('div');box.id='scannerOverlay';box.className='scanner-overlay';box.innerHTML=`<div class="scanner-sheet">${html}</div>`;document.body.appendChild(box)}
function closeScannerOverlay(stop=true){if(stop){stopBarcodeCamera();stopLiveImageCamera(false)}const old=document.getElementById('scannerOverlay');if(old)old.remove()}
async function startBarcodeCamera(mode='query', targetInputId=''){
  showScannerOverlay(`<div class="scanner-head"><h2>Escanear código</h2><button class="dark" onclick="closeScannerOverlay()">Cerrar</button></div><div class="scanner-video-wrap"><video id="barcodeVideo" playsinline muted></video><div class="scan-frame"></div><div class="scan-line"></div></div><div class="scan-status" id="barcodeStatus">Apunta al código de barras</div><div class="actions"><button class="btn" onclick="manualBarcodePrompt('${mode}','${targetInputId}')">Código manual</button></div>`);
  const video=el('barcodeVideo');
  if(!('BarcodeDetector' in window)){el('barcodeStatus').textContent='Tu navegador no soporta lectura automática. Usa manual.';return}
  try{BARCODE_STREAM=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}},audio:false});video.srcObject=BARCODE_STREAM;await video.play();const detector=new BarcodeDetector({formats:['ean_13','ean_8','code_128','code_39','upc_a','upc_e','qr_code']});BARCODE_TIMER=setInterval(async()=>{try{const codes=await detector.detect(video);if(codes&&codes.length){const code=String(codes[0].rawValue||'').trim();if(!code)return;playScanBeep();if(el('barcodeStatus'))el('barcodeStatus').textContent='Código detectado: '+code;await handleBarcodeDetected(code,mode,targetInputId)}}catch(e){}},550)}catch(e){if(el('barcodeStatus'))el('barcodeStatus').textContent='No se pudo abrir cámara: '+e.message;toast('No se pudo abrir la cámara','bad')}
}
async function handleBarcodeDetected(code,mode='query',targetInputId=''){stopBarcodeCamera();closeScannerOverlay(false);if(mode==='fill'&&targetInputId){if(el(targetInputId))el(targetInputId).value=code;toast('Código agregado: '+code);return}if(el('scanQ'))el('scanQ').value=code;const found=await searchProductByCode(code);if(found){showProductPopup(found,'Código detectado: '+code)}else modal(`<h1>No encontrado</h1><p class="muted">Código detectado: <b>${safe(code)}</b></p><p>No existe un producto vinculado a este código.</p><div class="actions"><button class="primary" onclick="closeModal();newProductForm()">Crear producto</button><button class="dark" onclick="closeModal()">Cerrar</button></div>`)}
function stopBarcodeCamera(){if(BARCODE_TIMER)clearInterval(BARCODE_TIMER);BARCODE_TIMER=null;if(BARCODE_STREAM){BARCODE_STREAM.getTracks().forEach(t=>t.stop())}BARCODE_STREAM=null}
async function searchProductByCode(code){const r=await api(`/api/products/search?client_id=${CLIENT.id}&q=${encodeURIComponent(code)}`);const list=r.products||[];return list.find(p=>String(p.barcode||'').trim()===String(code).trim())||list[0]||null}
function showProductPopup(p,subtitle='Producto encontrado'){playScanBeep();modal(`<h1>${safe(subtitle)}</h1><div class="card">${productFoundHtml(p)}<div class="actions"><button class="primary" onclick="closeModal();editProduct(${p.id})">Editar</button><button class="orange" onclick="closeModal();stockModal(${p.id})">Stock</button><button class="dark" onclick="closeModal()">Cerrar</button></div></div>`)}
async function detectBarcodeFromImage(inputId){const f=el(inputId)?.files?.[0];if(!f)return toast('Selecciona imagen','bad');if(!('BarcodeDetector' in window)){toast('Tu navegador no soporta lectura automática. Escribe el código manualmente.','bad');return}const img=new Image();img.onload=async()=>{try{const detector=new BarcodeDetector({formats:['ean_13','ean_8','code_128','code_39','upc_a','upc_e','qr_code']});const codes=await detector.detect(img);if(codes&&codes.length){const code=String(codes[0].rawValue||'').trim();playScanBeep();if(el('scanQ'))el('scanQ').value=code;const found=await searchProductByCode(code);if(found)showProductPopup(found,'Código detectado: '+code);else toast('Código detectado, pero no vinculado: '+code,'bad')}else toast('No se detectó código. Prueba otra foto o escríbelo manualmente.','bad')}catch(e){toast('No se pudo leer el código: '+e.message,'bad')}};img.src=URL.createObjectURL(f)}
function manualBarcodePrompt(mode='query',targetInputId=''){modal(`<h1>Código manual</h1><p class="muted">Escribe o pega el código de barras.</p><input id="manualBarcodeValue" placeholder="Ej: 775..."><div class="actions"><button class="primary" onclick="useManualBarcode('${mode}','${targetInputId}')">Aceptar</button><button class="dark" onclick="closeModal()">Cancelar</button></div>`)}
async function useManualBarcode(mode='query',targetInputId=''){const code=el('manualBarcodeValue').value.trim();if(!code)return toast('Escribe el código','bad');closeModal();if(mode==='fill'&&targetInputId){if(el(targetInputId))el(targetInputId).value=code;toast('Código agregado');return}if(el('scanQ'))el('scanQ').value=code;await scanSearch()}
async function linkBarcodeToProduct(productId,barcode){if(!barcode)return toast('Falta código de barras','bad');showLoad('Vinculando código...');const r=await api(`/api/products/${productId}`,{method:'PUT',body:JSON.stringify({barcode})});hideLoad();if(!r.ok){toast(r.error||'No se pudo vincular','bad');return}toast('Código vinculado al producto');await loadClient()}
async function startLiveImageCamera(){showScannerOverlay(`<div class="scanner-head"><h2>Buscar por imagen</h2><button class="dark" onclick="closeScannerOverlay()">Cerrar</button></div><div class="scanner-video-wrap"><video id="liveImageVideo" playsinline muted></video><div class="scan-frame"></div><div class="scan-line"></div></div><div class="scan-status" id="liveImageStatus">Apunta al producto</div><div class="actions"><button class="primary" onclick="captureLiveImageOnce()">Comparar ahora</button><button class="btn" onclick="el('scanGalleryFile')?.click();closeScannerOverlay()">Subir galería</button></div>`);const video=el('liveImageVideo');try{LIVE_IMG_STREAM=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}},audio:false});video.srcObject=LIVE_IMG_STREAM;await video.play();LIVE_IMG_LAST=null;LIVE_IMG_REPEAT=0;LIVE_IMG_BUSY=false;LIVE_IMG_TIMER=setInterval(()=>captureLiveFrameAndCompare(false),1800)}catch(e){if(el('liveImageStatus'))el('liveImageStatus').textContent='No se pudo abrir cámara: '+e.message;toast('No se pudo abrir la cámara','bad')}}
function stopLiveImageCamera(remove=true){if(LIVE_IMG_TIMER)clearInterval(LIVE_IMG_TIMER);LIVE_IMG_TIMER=null;LIVE_IMG_BUSY=false;LIVE_IMG_LAST=null;LIVE_IMG_REPEAT=0;if(LIVE_IMG_STREAM){LIVE_IMG_STREAM.getTracks().forEach(t=>t.stop())}LIVE_IMG_STREAM=null;if(remove){const old=document.getElementById('scannerOverlay');if(old)old.remove()}}
async function captureLiveImageOnce(){await captureLiveFrameAndCompare(true)}
async function captureLiveFrameAndCompare(manual=false){const video=el('liveImageVideo');if(!video||!video.videoWidth||LIVE_IMG_BUSY)return;LIVE_IMG_BUSY=true;try{if(el('liveImageStatus'))el('liveImageStatus').textContent=manual?'Comparando ahora...':'Analizando producto...';const canvas=document.createElement('canvas');canvas.width=video.videoWidth;canvas.height=video.videoHeight;canvas.getContext('2d').drawImage(video,0,0,canvas.width,canvas.height);const blob=await new Promise(res=>canvas.toBlob(res,'image/jpeg',0.82));const fd=new FormData();fd.append('client_id',CLIENT.id);fd.append('image',new File([blob],'frame.jpg',{type:'image/jpeg'}));const r=await api('/api/products/detect',{method:'POST',body:fd});if(r.ok&&r.similar&&r.product){const pid=String(r.product.id);if(pid===LIVE_IMG_LAST)LIVE_IMG_REPEAT++;else{LIVE_IMG_LAST=pid;LIVE_IMG_REPEAT=1}if(el('liveImageStatus'))el('liveImageStatus').textContent=`Coincidencia ${LIVE_IMG_REPEAT}/2: ${productName(r.product)}`;if(manual||LIVE_IMG_REPEAT>=2){playScanBeep();stopLiveImageCamera(false);closeScannerOverlay(false);renderDetectResult(r)}}else{LIVE_IMG_LAST=null;LIVE_IMG_REPEAT=0;if(el('liveImageStatus'))el('liveImageStatus').textContent='Sin coincidencia segura. Sigue apuntando...'}}catch(e){if(el('liveImageStatus'))el('liveImageStatus').textContent='No se pudo comparar. Intenta de nuevo.'}finally{LIVE_IMG_BUSY=false}}

function clientPOS(){if(!hasService("bodega_pos")&&!hasService("minimarket_pos")&&!hasService("almacen_pos"))return inactive();setTitle("Punto de venta","Carrito, cálculo y ticket");el("view").innerHTML=`<div class="card"><h1>Punto de venta</h1><div class="grid2"><input id="posQ" placeholder="Buscar producto por nombre/código"><button class="primary" onclick="posSearch()">Buscar</button></div><div id="posResults"></div><h2>Carrito</h2><div id="cart"></div><div class="total-box"><div class="price" id="cartTotal">${money(0)}</div></div><div class="grid2"><input id="saleCustomer" placeholder="Nombre del cliente"><input id="salePhone" placeholder="Celular WhatsApp del cliente"></div><select id="salePay"><option>Efectivo</option><option>Yape</option><option>Plin</option><option>Tarjeta</option></select><button class="primary full" onclick="finishSale()">Pagar y generar ticket</button></div>`;renderCart()}
async function posSearch(){const r=await api(`/api/products/search?client_id=${CLIENT.id}&q=${encodeURIComponent(el("posQ").value)}`);el("posResults").innerHTML=(r.products||[]).map(p=>`<div class="list-card"><b>${safe(productName(p))}</b><div class="price">${money(p.sale_price)}</div><p>Stock: ${p.stock}</p><input id="qty_${p.id}" type="number" value="1"><button class="primary" onclick="addCart(${p.id})">Agregar al carrito</button></div>`).join("")||"No encontrado"}
function addCart(id){const p=PRODUCTS.find(x=>x.id===id);const qty=Number(el("qty_"+id)?.value||1);CART.push({product_id:id,product_name:productName(p),quantity:qty,unit_price:p.sale_price,total:qty*p.sale_price});renderCart();toast("Agregado")}
function renderCart(){if(!el("cart"))return;el("cart").innerHTML=CART.map((i,idx)=>`<div class="list-card">${safe(i.product_name)} x ${i.quantity} = <b>${money(i.total)}</b> <button class="red small" onclick="CART.splice(${idx},1);renderCart()">Quitar</button></div>`).join("")||"<p>Carrito vacío.</p>";el("cartTotal").textContent=money(CART.reduce((a,b)=>a+b.total,0))}
async function finishSale(){if(!CART.length)return toast("Carrito vacío","bad");const phone=el("salePhone").value;showLoad("Generando ticket...");const r=await api("/api/sales",{method:"POST",body:JSON.stringify({client_id:CLIENT.id,items:CART,customer_name:el("saleCustomer").value||"Cliente general",customer_phone:phone,payment_method:el("salePay").value})});hideLoad();if(!r.ok){toast(r.error||"Error","bad");return}CART=[];await loadClient();const pdf=absUrl(r.pdf_url);const ticket=absUrl(r.ticket_url);const wa=waNumber(phone);const msg=`Hola, le envío su ticket de compra de ${CLIENT.business_name} por ${money(r.total)}. Link: ${ticket}`;modal(`<h1>Venta registrada</h1><div class="price">${money(r.total)}</div><p class="muted">Primero descarga el ticket PDF. Luego puedes abrir WhatsApp del cliente para enviarlo.</p><div class="actions"><a href="${pdf}" target="_blank"><button class="primary">Descargar ticket PDF</button></a>${wa?`<button class="green" onclick="window.open('https://wa.me/${wa}?text='+encodeURIComponent(msg),'_blank')">Abrir WhatsApp</button>`:""}<button class="dark" onclick="closeModal();clientPOS()">Cerrar</button></div>`)}
async function clientCredits(){if(!hasService("bodega_credits")&&!hasService("minimarket_credits"))return inactive();setTitle("Créditos / Cuentas","Fiado, link público y PDF");showLoad("Cargando cuentas...");const r=await api(`/api/credits/customers?client_id=${CLIENT.id}`);hideLoad();el("view").innerHTML=`<div class="card"><h1>Créditos / Cuentas</h1><div class="actions"><button class="primary" onclick="newCreditCustomer()">Crear cuenta</button><button class="btn" onclick="clientCredits()">Actualizar</button></div>${(r.customers||[]).map(c=>`<div class="list-card"><h2>${safe(c.name)}</h2><p>${safe(c.whatsapp)}</p><div class="price">${money(c.total_current)}</div><div class="actions"><button class="dark" onclick="openCredit(${c.id})">Abrir</button><button class="red" onclick="deleteCreditCustomer(${c.id})">Eliminar</button></div></div>`).join("")||"Sin cuentas."}</div>`}
function newCreditCustomer(){modal(`<h1>Crear cuenta de fiado</h1><label>Nombre</label><input id="ccName"><label>WhatsApp</label><input id="ccWsp"><button class="primary" onclick="saveCreditCustomer()">Guardar</button><button class="dark" onclick="closeModal()">Cerrar</button>`)}
async function saveCreditCustomer(){showLoad("Creando cuenta...");await api("/api/credits/customers",{method:"POST",body:JSON.stringify({client_id:CLIENT.id,name:el("ccName").value,whatsapp:el("ccWsp").value})});hideLoad();closeModal();clientCredits()}
async function openCredit(id){showLoad("Abriendo cuenta...");const r=await api(`/api/credits/${id}`);hideLoad();CURRENT_CREDIT=r;const c=r.customer;modal(`<h1>${safe(c.name)}</h1><div class="price">Total: ${money(c.total_current)}</div><div class="actions"><button class="primary" onclick="creditAddForm()">Agregar fiado</button><a href="${absUrl(c.public_url)}" target="_blank"><button class="dark">Link público</button></a><a href="${absUrl(c.pdf_url)}" target="_blank"><button class="primary">PDF descargable</button></a><button class="btn" onclick="sendCreditWA()">WhatsApp</button><button class="green" onclick="payCredit(${c.id})">Marcar como pagado</button><button class="red" onclick="deleteCreditCustomer(${c.id})">Eliminar cuenta</button></div><h3>Detalle</h3><table><tr><th>Producto</th><th>Cant.</th><th>P. unit.</th><th>Total</th><th>Fecha</th></tr>${r.items.map(i=>`<tr><td>${safe(i.product_name)}</td><td>${i.quantity}</td><td>${money(i.unit_price)}</td><td>${money(i.total)}</td><td>${safe(i.created_at)}</td></tr>`).join("")}</table><h3>Historial pagado</h3>${r.history.map(h=>`<p>${h.created_at} - ${money(h.total_paid)} <a href="${absUrl(h.public_url)}" target="_blank">ver comprobante</a> · <a href="${absUrl(h.pdf_url)}" target="_blank">PDF</a></p>`).join("")||"<p>Sin historial.</p>"}<button class="dark" onclick="closeModal()">Cerrar</button>`)}

function deleteCreditCustomer(id){
  confirmBox("Eliminar cuenta de crédito","La cuenta se ocultará del panel, pero se conservará el historial interno.",`doDeleteCreditCustomer(${id})`)
}
async function doDeleteCreditCustomer(id){
  showLoad("Eliminando cuenta...");
  const r=await api(`/api/credits/customers/${id}`,{method:"DELETE"});
  hideLoad();
  if(!r.ok){toast(r.error||"No se pudo eliminar","bad");return}
  closeModal();
  toast("Cuenta eliminada");
  clientCredits();
}

function creditAddForm(){const opts=PRODUCTS.map(p=>`<option value="${p.id}">${safe(productName(p))} - ${money(p.sale_price)}</option>`).join("");modal(`<h1>Agregar fiado</h1><label>Producto registrado</label><select id="crProd" onchange="fillCreditPrice()"><option value="">Manual</option>${opts}</select><label>Producto manual</label><input id="crName"><label>Cantidad</label><input id="crQty" type="number" value="1" oninput="calcCreditLine()"><label>Precio unitario</label><input id="crUnit" type="number" value="0" oninput="calcCreditLine()"><div class="price" id="crLine">S/ 0.00</div><button class="primary" onclick="saveCreditItem()">Agregar</button><button class="dark" onclick="openCredit(${CURRENT_CREDIT.customer.id})">Volver</button>`)}
function fillCreditPrice(){const p=PRODUCTS.find(x=>x.id==el("crProd").value);if(p){el("crName").value=productName(p);el("crUnit").value=p.sale_price}calcCreditLine()}
function calcCreditLine(){el("crLine").textContent=money(Number(el("crQty").value||0)*Number(el("crUnit").value||0))}
async function saveCreditItem(){showLoad("Agregando fiado...");const product_id=el("crProd").value||null;const r=await api("/api/credits/items",{method:"POST",body:JSON.stringify({credit_customer_id:CURRENT_CREDIT.customer.id,product_id,product_name:el("crName").value,quantity:el("crQty").value,unit_price:el("crUnit").value})});hideLoad();if(!r.ok){toast(r.error||"Error","bad");return}await loadClient();openCredit(CURRENT_CREDIT.customer.id)}
function sendCreditWA(){const c=CURRENT_CREDIT.customer;const txt=`Detalle de deuda ${c.name}: Total ${money(c.total_current)}. Link: ${absUrl(c.public_url)}`;window.open(`https://wa.me/51${String(c.whatsapp).replace(/\D/g,'')}?text=${encodeURIComponent(txt)}`,"_blank")}
async function payCredit(id){confirmBox("Marcar como pagado","Esta acción cerrará la deuda actual y guardará historial.",`doPayCredit(${id})`)}
async function doPayCredit(id){showLoad("Cerrando deuda...");const r=await api(`/api/credits/${id}/pay`,{method:"POST"});hideLoad();toast("Cuenta pagada");modal(`<h1>Cuenta pagada</h1><div class="price">${money(r.total)}</div><a href="${r.paid_url}" target="_blank"><button class="dark">Ver comprobante pagado</button></a><a href="${r.paid_pdf_url}" target="_blank"><button class="primary">Descargar PDF pagado</button></a><button class="primary" onclick="closeModal();clientCredits()">Cerrar</button>`)}
async function clientPayments(){setTitle("Pagos / QR","Configura tus medios de pago");const r=await api(`/api/payments?client_id=${CLIENT.id}`);PAYMENT_CACHE=r.payments||[];el("view").innerHTML=`<div class="card"><h1>Pagos / QR</h1><p class="muted">Estos QR se mostrarán para que tus clientes escaneen desde su celular y puedan pagar con Yape, Plin u otro medio.</p><div class="qr-carousel">${PAYMENT_CACHE.map(qrCard).join("")||"<div class=\"card\">Aún no tienes QR guardado.</div>"}</div><h2>Agregar medio de pago</h2>${paymentFormHtml()}<div class="actions"><button class="primary" onclick="savePayment()">Guardar medio de pago</button></div></div>`}
function clientExpirations(){setTitle("Vencimientos","Productos por vencer");const list=PRODUCTS.filter(p=>p.expiration_date);el("view").innerHTML=`<div class="card"><h1>Vencimientos</h1>${list.map(p=>`<div class="list-card"><b>${safe(p.name)}</b><p>Vence: ${safe(p.expiration_date)}</p></div>`).join("")||"No hay vencimientos registrados."}</div>`}
</script>
