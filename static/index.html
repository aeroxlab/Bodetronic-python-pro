<style>
:root{--bg:#020806;--panel:#06120d;--panel2:#091710;--line:#0d401d;--neon:#20ff29;--neon2:#16c784;--text:#e6edf3;--muted:#9aa4af;--warn:#facc15;--danger:#ef4444;--white:#fff;--shadow:0 0 34px rgba(32,255,41,.22)}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#103322 0,#020806 36%,#000 100%);color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;min-height:100vh;overflow-x:hidden}.gridbg:before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(32,255,41,.08) 1px,transparent 1px),linear-gradient(90deg,rgba(32,255,41,.08) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;mask-image:linear-gradient(#000,transparent 78%)}button,input,select,textarea{font:inherit}button{border:0;cursor:pointer}.app{display:flex;min-height:100vh}.side{width:310px;background:rgba(0,0,0,.78);border-right:1px solid var(--line);padding:24px 18px;position:fixed;inset:0 auto 0 0;z-index:20;transition:.3s transform;backdrop-filter:blur(18px)}.brand{display:flex;gap:14px;align-items:center;margin-bottom:28px}.logo{width:62px;height:62px;border-radius:20px;background:linear-gradient(135deg,var(--neon),#0d8f28);display:grid;place-items:center;color:#041006;font-size:36px;font-weight:950;box-shadow:var(--shadow)}.brand h1{font-size:26px;line-height:1.05;margin:0}.brand p{margin:4px 0 0;color:var(--muted)}.nav button{width:100%;display:flex;align-items:center;gap:14px;margin:8px 0;padding:16px 14px;border:1px solid transparent;border-radius:18px;background:transparent;color:#d7e3ef;font-weight:800;text-align:left;transition:.2s}.nav button:hover,.nav button.active{background:rgba(32,255,41,.12);border-color:#125d26;color:#fff;box-shadow:0 0 20px rgba(32,255,41,.1)}.main{margin-left:310px;width:calc(100% - 310px)}.top{position:sticky;top:0;background:rgba(2,8,6,.9);border-bottom:1px solid var(--line);backdrop-filter:blur(18px);z-index:10;padding:18px 28px;display:flex;align-items:center;justify-content:space-between}.hamb{display:none;width:62px;height:62px;border-radius:20px;background:#102018;color:#e7f4ec;border:1px solid #16411d;font-size:30px}.top-title h2{margin:0;font-size:34px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60vw}.top-title p{margin:4px 0 0;color:var(--muted);font-size:18px}.exit{padding:15px 22px;border-radius:18px;background:#050b14;color:#fff;border:1px solid #24402a;font-weight:900}.content{padding:34px;max-width:1180px}.hero{border:1px solid var(--line);background:linear-gradient(180deg,rgba(2,18,10,.92),rgba(1,8,5,.94));border-radius:34px;padding:34px;box-shadow:var(--shadow);position:relative;overflow:hidden}.hero:after{content:"";position:absolute;right:-80px;top:-90px;width:260px;height:260px;background:radial-gradient(circle,var(--neon),transparent 64%);opacity:.18}.eyebrow{color:var(--neon);letter-spacing:.18em;font-weight:950;text-transform:uppercase}.hero h3,.card h3{font-size:46px;margin:12px 0 14px;line-height:1.02}.muted{color:var(--muted)}.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px;margin:22px 0}.card{border:1px solid #153f20;background:rgba(5,15,10,.9);border-radius:28px;padding:22px;box-shadow:0 18px 35px rgba(0,0,0,.25)}.stat{font-size:42px;color:var(--neon);font-weight:950}.btns{display:flex;flex-wrap:wrap;gap:14px;margin-top:18px}.btn{padding:15px 20px;border-radius:18px;font-weight:950;background:linear-gradient(135deg,var(--neon),var(--neon2));color:#041006;box-shadow:var(--shadow);display:inline-flex;align-items:center;gap:10px}.btn.dark{background:#0a1310;color:#e8f5ee;border:1px solid #1d4d27;box-shadow:none}.btn.gray{background:#17211d;color:#dfe8e1;box-shadow:none}.btn.danger{background:#451319;color:#ffdbe0;border:1px solid #822}.btn.warn{background:#463605;color:#fff1a8;border:1px solid #775c00}.btn.small{padding:10px 12px;border-radius:14px;font-size:14px}.section{display:none;animation:fade .25s ease}.section.active{display:block}@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}label{display:block;font-weight:900;color:#cbd5df;margin:12px 0 7px}.formgrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.field,input,select,textarea{width:100%;border:1px solid #164c25;border-radius:18px;background:#02100b;color:#e6edf3;padding:16px;outline:none}textarea{min-height:96px}input[type=file]{padding:12px}.list{display:grid;gap:15px}.product-card{display:grid;grid-template-columns:100px 1fr;gap:16px;align-items:center}.thumb{width:100px;height:100px;border-radius:22px;background:#fff;object-fit:cover}.price{font-size:34px;color:var(--neon);font-weight:950}.result-card{max-width:620px;margin:auto;border-radius:34px;border:1px solid #155c25;background:#020b08;overflow:hidden;box-shadow:var(--shadow)}.result-img{height:250px;display:grid;place-items:center;background:linear-gradient(180deg,#020806,#05130d)}.result-img img{max-width:84%;max-height:220px;object-fit:contain;border-radius:22px;background:white}.result-body{padding:22px}.data-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}.data-box{border:1px solid #173b20;background:#05120c;border-radius:18px;padding:15px}.data-box b{display:block;color:#819189;text-transform:uppercase;font-size:12px;letter-spacing:.1em}.modal,.loading{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:60;display:none;align-items:center;justify-content:center;padding:22px}.modal.show,.loading.show{display:flex}.modal-card{width:min(760px,100%);max-height:88vh;overflow:auto;background:#06120d;border:1px solid #145322;border-radius:30px;padding:24px;box-shadow:var(--shadow)}.spin{width:72px;height:72px;border-radius:50%;border:10px solid rgba(32,255,41,.18);border-top-color:var(--neon);animation:rot 1s linear infinite;margin:auto}@keyframes rot{to{transform:rotate(360deg)}}.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#052e16;color:white;border:1px solid var(--neon);padding:14px 18px;border-radius:18px;z-index:80;display:none;box-shadow:var(--shadow);font-weight:900}.ad-ticker{position:fixed;left:0;right:0;bottom:0;background:#03120b;border-top:1px solid var(--neon);color:#d9f99d;z-index:35;display:none;overflow:hidden;white-space:nowrap;padding:10px}.ad-ticker span{display:inline-block;animation:ticker 16s linear infinite}@keyframes ticker{from{transform:translateX(100vw)}to{transform:translateX(-100%)}}#reader{border:1px solid #185a27;border-radius:24px;overflow:hidden;margin-top:16px}.footer{margin:40px 0 10px;color:#8b949e;text-align:center;line-height:1.5}.pill{display:inline-flex;padding:8px 12px;border-radius:999px;background:rgba(32,255,41,.12);color:#d9f99d;font-weight:900}.photo-list{display:grid;gap:10px;margin-top:10px}.photo-list div{background:#07150e;border:1px solid #163d20;border-radius:14px;padding:10px;color:#b8c4be}.cart-row,.credit-row{display:grid;grid-template-columns:1fr 70px 85px auto;gap:10px;align-items:center;border-bottom:1px solid #173b20;padding:10px 0}
@media(max-width:1100px){.side{transform:translateX(-105%);width:min(86vw,340px)}.side.open{transform:none}.main{margin-left:0;width:100%}.top{padding:14px}.hamb{display:block;flex:0 0 auto}.top-title h2{font-size:29px;max-width:calc(100vw - 190px)}.top-title p{font-size:15px}.content{padding:22px 15px}.hero,.card{border-radius:26px;padding:22px}.hero h3,.card h3{font-size:34px}.formgrid{grid-template-columns:1fr}.data-row{grid-template-columns:1fr}.product-card{grid-template-columns:82px 1fr}.thumb{width:82px;height:82px}.btn{width:100%;justify-content:center}.btn.small{width:auto}.cart-row,.credit-row{grid-template-columns:1fr;gap:6px}.exit{padding:14px 18px}.modal-card{padding:18px}.result-img{height:210px}}

.quick-stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin:18px 0 22px}.mini-stat{padding:14px 16px;border-radius:20px;border:1px solid #14401e;background:rgba(4,14,10,.92)}.mini-stat b{display:block;color:#cdd7de;font-size:14px}.mini-stat .n{display:block;font-size:28px;font-weight:950;color:var(--neon);margin-top:6px}.quick-links{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.action-btn{padding:18px 18px;border-radius:22px;border:1px solid #13401d;background:#07130d;color:#dce6ef;font-weight:900;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 10px 26px rgba(0,0,0,.18)}.action-btn.primary{background:linear-gradient(135deg,var(--neon),var(--neon2));color:#041006;box-shadow:var(--shadow)}.field-action{display:flex;gap:10px;align-items:center}.field-action input{flex:1}.stack-actions{display:flex;flex-wrap:wrap;gap:10px}.gallery-picks{display:grid;gap:8px;margin-top:10px}.gallery-picks .pick{display:flex;align-items:center;justify-content:space-between;gap:10px;background:#06140d;border:1px solid #16441f;border-radius:16px;padding:10px 12px}.gallery-picks .pick small{color:var(--muted)}.img-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:12px;margin-top:14px}.img-item{background:#06120d;border:1px solid #16411f;border-radius:18px;padding:10px}.img-item img{width:100%;height:90px;object-fit:cover;border-radius:14px;background:#fff}.img-item .tag{display:inline-flex;margin-top:8px;font-size:11px;padding:4px 8px;border-radius:999px;background:rgba(32,255,41,.12);color:#d9f99d;font-weight:900}.footer-box{margin:40px 0 12px;border:1px solid #153d20;background:rgba(6,18,13,.92);border-radius:22px;padding:16px 18px;text-align:center}.footer-box .f1{font-weight:950;color:#e9eff6}.footer-box .f2,.footer-box .f3{color:#9aa4af;font-size:14px;margin-top:4px}.top-actions{display:flex;flex-wrap:wrap;gap:10px}.result-head{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}.readonly-note{border:1px solid #17451f;background:#07140d;border-radius:16px;padding:12px 14px;color:#b8c5bd;margin:12px 0}.copyline{display:flex;gap:10px;align-items:center;flex-wrap:wrap;background:#06140d;border:1px solid #16401f;padding:10px 12px;border-radius:16px;margin-top:10px}.copyline code{color:#d9f99d;word-break:break-all}.softbar{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}.softbar .btn,.softbar .action-btn{flex:1}.muted-small{font-size:13px;color:#8b949e}.toolbar-right{display:flex;gap:10px;align-items:center}.icon-round{width:44px;height:44px;border-radius:16px;display:inline-flex;align-items:center;justify-content:center;background:#08110d;border:1px solid #184723;font-weight:900}
@media(max-width:1100px){.quick-stats{grid-template-columns:repeat(2,minmax(0,1fr))}.quick-links{grid-template-columns:1fr}.field-action{flex-direction:column;align-items:stretch}.footer-box{margin-bottom:24px}}
</style>
</head>
<body class="gridbg">
<div id="toast" class="toast"></div><div id="loading" class="loading"><div><div class="spin"></div><p id="loadingText" style="text-align:center;font-weight:900;margin-top:16px">Cargando...</p></div></div>
<div class="app"><aside id="side" class="side"><div class="brand"><div id="logo" class="logo">B</div><div><h1 id="brandName">Bodega Chebitas</h1><p>Panel independiente</p></div></div><nav class="nav" id="nav"></nav><div class="footer" id="footerSide"></div></aside><main class="main"><header class="top"><button class="hamb" onclick="toggleMenu()">☰</button><div class="top-title"><h2 id="viewTitle">Inicio</h2><p id="viewSub">Bodega Chebitas</p></div><button class="exit" onclick="location.reload()">Salir</button></header><section class="content" id="content"></section></main></div><div id="modal" class="modal"><div class="modal-card" id="modalContent"></div></div><div id="ticker" class="ad-ticker"><span id="tickerText"></span></div>
<script>
let STATE={settings:{},products:[],credits:[],payments:[],ads:[],summary:{}};let current='inicio';let cart=[];let scanner=null;
const views=[['inicio','⌂','Inicio'],['productos','Productos'],['scanner','Scaner / Cámara'],['pos','POS','Punto de venta'],['creditos','S/','Créditos'],['pagos','QR','Pagos / QR'],['publicidad','AD','Publicidad'],['config','⚙','Configuración']];
function qs(s){return document.querySelector(s)}function money(v){return 'S/ '+(Number(v||0).toFixed(2))}function api(u,o={}){return fetch(u,o).then(async r=>{if(!r.ok)throw new Error((await r.text()).slice(0,200));return r.json()})}function showLoad(t='Procesando...'){qs('#loadingText').textContent=t;qs('#loading').classList.add('show')}function hideLoad(){qs('#loading').classList.remove('show')}function toast(t){let e=qs('#toast');e.textContent=t;e.style.display='block';setTimeout(()=>e.style.display='none',2800)}function toggleMenu(){qs('#side').classList.toggle('open')}function setView(v){current=v;render();qs('#side').classList.remove('open')}
function defaultState(){return {settings:{business_name:'Bodega Chebitas',subtitle:'Panel independiente',logo_text:'B',support_whatsapp:'51992657332',primary_color:'#20ff29',text_color:'#e6edf3',footer:'AeroxLab | WEB DEVELOPER TEAM | © 2025-2026 Aerox Security Consulting LLC | Derechos reservados | Políticas de privacidad'},products:[],credits:[],payments:[],ads:[],summary:{products:0,credits:0,sales:0,stock_low:0}}}
async function load(){showLoad('Cargando Bodega Chebitas...');try{STATE=await api('/api/state');applySettings();renderNav();renderAds();render()}catch(e){STATE=defaultState();applySettings();renderNav();renderAds();render();toast('Vista previa local. Las funciones reales cargan en Render.')}finally{hideLoad()}}
function renderFooterHTML(){let s=STATE.settings||{};return `<div class="footer-box"><div class="f1">AeroxLab · WEB DEVELOPER TEAM</div><div class="f2">© 2025-2026 Aerox Security Consulting LLC</div><div class="f3">Derechos reservados | Políticas de privacidad</div></div>`}
async function load(){showLoad('Cargando Bodega Chebitas...');try{STATE=await api('/api/state');applySettings();renderNav();renderAds();render()}catch(e){STATE=defaultState();applySettings();renderNav();renderAds();render();toast('Vista previa local. Las funciones reales cargan en Render.')}finally{hideLoad()}}
function applySettings(){let s=STATE.settings||{};qs('#brandName').textContent=s.business_name||'Bodega Chebitas';qs('#logo').textContent=s.logo_text||'B';qs('#footerSide').innerHTML=renderFooterHTML();document.documentElement.style.setProperty('--neon',s.primary_color||'#20ff29');document.documentElement.style.setProperty('--text',s.text_color||'#e6edf3');}
function renderNav(){qs('#nav').innerHTML=views.map(v=>`<button class="${current==v[0]?'active':''}" onclick="setView('${v[0]}')"><b>${v[1]}</b> ${v[2]}</button>`).join('')}
function render(){renderNav();let v=views.find(x=>x[0]==current);qs('#viewTitle').textContent=v?v[2]:'Inicio';qs('#viewSub').textContent=current=='inicio'?'Dashboard de bodega':'Bodega Chebitas';let c=qs('#content');({inicio:renderHome,productos:renderProducts,scanner:renderScanner,pos:renderPOS,creditos:renderCredits,pagos:renderPayments,publicidad:renderAdsAdmin,config:renderConfig}[current]||renderHome)(c)}
function renderHome(c){c.innerHTML=`<div class="hero"><div class="eyebrow">INICIO</div><h3>${STATE.settings.business_name||'Bodega Chebitas'}</h3><div class="quick-stats"><div class="mini-stat"><b>Productos</b><span class="n">${STATE.summary.products||0}</span></div><div class="mini-stat"><b>Créditos</b><span class="n">${STATE.summary.credits||0}</span></div><div class="mini-stat"><b>Ventas</b><span class="n">${STATE.summary.sales||0}</span></div><div class="mini-stat"><b>Stock bajo</b><span class="n">${STATE.summary.stock_low||0}</span></div></div><div class="quick-links"><button class="action-btn primary" onclick="setView('productos')">Ver productos</button><button class="action-btn" onclick="setView('scanner')">Scaner</button><button class="action-btn" onclick="setView('creditos')">S/ Créditos</button><button class="action-btn" onclick="setView('pagos')">QR Pagos</button></div></div><div id="homeAds"></div>${renderFooterHTML()}`;renderAdsInto('homeAds','inicio')}
function renderProducts(c){c.innerHTML=`<div class="hero"><div class="eyebrow">PRODUCTOS</div><h3>Registrar / editar productos</h3><form id="productForm"><div class="formgrid"><div><label>Nombre</label><input name="name" required placeholder="Ej: Agua 1 litro"></div><div><label>Marca</label><input name="brand" placeholder="Ej: San Luis"></div><div><label>Código de barras</label><div class="field-action"><input name="barcode" id="prodBarcode" placeholder="Escanea o escribe"><button type="button" class="btn dark small" onclick="scanIntoField('prodBarcode')">Scaner</button></div></div><div><label>Referencia</label><input name="reference" placeholder="Código interno o referencia"></div><div><label>Categoría</label><input name="category" value="Bodega"></div><div><label>Presentación</label><input name="presentation" placeholder="1 litro, pack, unidad..."></div><div><label>Stock</label><input name="stock" type="number" step="0.01" value="0"></div><div><label>Stock mínimo</label><input name="min_stock" type="number" step="0.01" value="1"></div><div><label>Precio compra / real</label><input name="real_price" type="number" step="0.01" value="0"></div><div><label>Precio venta</label><input name="sale_price" type="number" step="0.01" value="0"></div><div><label>Vencimiento</label><input name="expiration_date" type="date"></div><div><label>Fotos de referencia</label><div class="stack-actions"><button type="button" class="btn dark small" onclick="prodPhotosGallery.click()">Galería</button><button type="button" class="btn dark small" onclick="prodPhotosCamera.click()">Tomar foto</button></div><input id="prodPhotosGallery" name="photos" hidden type="file" accept="image/*" multiple onchange="mergeSelectedFiles(this,'prodPhotoList')"><input id="prodPhotosCamera" name="photos" hidden type="file" accept="image/*" capture="environment" multiple onchange="mergeSelectedFiles(this,'prodPhotoList')"><div id="prodPhotoList" class="gallery-picks"></div></div></div><label>Observación</label><textarea name="notes"></textarea><div class="btns"><button class="btn">＋ Guardar producto</button><button type="button" class="btn dark" onclick="setView('scanner')">Scaner</button><button type="button" class="btn gray" onclick="setView('inicio')">Atrás</button></div></form></div><div class="cards">${STATE.products.map(productCard).join('')||'<div class="card">Sin productos registrados.</div>'}</div>${renderFooterHTML()}`;qs('#productForm').onsubmit=saveProduct}
let stagedFiles=[];
function mergeSelectedFiles(inp,id){if(inp.files&&inp.files.length){stagedFiles=stagedFiles.concat([...inp.files]);renderSelectedFiles(id)}inp.value=''}
function renderSelectedFiles(id){qs('#'+id).innerHTML=stagedFiles.map((f,i)=>`<div class="pick"><div><b>${i===0?'Foto principal':'Foto adicional '+i}</b><br><small>${f.name}</small></div><div class="toolbar-right"><button type="button" class="btn small gray" onclick="moveFile(${i},-1)">↑</button><button type="button" class="btn small danger" onclick="removeFile(${i},'${id}')">Eliminar</button></div></div>`).join('') || '<div class="pick"><small>Sin fotos seleccionadas.</small></div>'}
function moveFile(i,delta){const j=i+delta;if(j<0||j>=stagedFiles.length)return;const tmp=stagedFiles[i];stagedFiles[i]=stagedFiles[j];stagedFiles[j]=tmp;renderSelectedFiles('prodPhotoList')}
function removeFile(i,id){stagedFiles.splice(i,1);renderSelectedFiles(id)}
async function saveProduct(e){e.preventDefault();showLoad('Guardando producto...');try{let fd=new FormData(e.target);stagedFiles.forEach(f=>fd.append('photos',f));await api('/api/products',{method:'POST',body:fd});stagedFiles=[];toast('Producto guardado');await load();setView('productos')}catch(err){toast(err.message)}finally{hideLoad()}}
function productCard(p){return `<div class="card product-card"><img class="thumb" src="${p.image_url||''}" onerror="this.style.display='none'"><div><h3 style="font-size:25px;margin:0 0 8px">${p.display_name}</h3><div class="muted">Código: ${p.barcode||p.internal_code||'-'} · Stock: ${p.stock}</div><div class="price">${money(p.sale_price)}</div><div class="btns"><button class="btn small" onclick='openProduct(${JSON.stringify(p).replaceAll("'","&#39;")})'>Editar</button><button class="btn small dark" onclick="stockMove(${p.id},'CARGA')">Cargar</button><button class="btn small warn" onclick="stockMove(${p.id},'DESCARGA')">Descargar</button><button class="btn small danger" onclick="deleteProduct(${p.id})">Eliminar</button></div></div></div>`}
function productImagesHtml(p){return (p.images||[]).map(im=>`<div class="img-item"><img src="${im.image_url}"><div>${im.is_main?'<span class="tag">Principal</span>':'<span class="muted-small">Foto</span>'}</div><div class="btns"><button class="btn small gray" onclick="setMainImage(${p.id},${im.id})">Principal</button><button class="btn small danger" onclick="deleteProductImage(${p.id},${im.id})">Eliminar</button></div></div>`).join('')||'<p class="muted">Sin fotos.</p>'}
function openProduct(p){modal(`<h3>Editar producto</h3><div class="formgrid"><div><label>Nombre</label><input id="eName" value="${p.name||''}"></div><div><label>Marca</label><input id="eBrand" value="${p.brand||''}"></div><div><label>Código de barras</label><div class="field-action"><input id="eBarcode" value="${p.barcode||''}"><button class="btn dark small" onclick="scanIntoField('eBarcode')">Scaner</button></div></div><div><label>Referencia</label><input id="eReference" value="${p.reference||''}"></div><div><label>Presentación</label><input id="ePres" value="${p.presentation||''}"></div><div><label>Categoría</label><input id="eCategory" value="${p.category||''}"></div><div><label>Stock</label><input id="eStock" type="number" value="${p.stock}"></div><div><label>Stock mínimo</label><input id="eMinStock" type="number" value="${p.min_stock||0}"></div><div><label>Precio compra</label><input id="eRealPrice" type="number" value="${p.real_price||0}"></div><div><label>Precio venta</label><input id="ePrice" type="number" value="${p.sale_price}"></div><div><label>Vencimiento</label><input id="eExp" type="date" value="${p.expiration_date||''}"></div><div><label>Notas</label><input id="eNotes" value="${(p.notes||'').replace(/"/g,'&quot;')}"></div></div><div class="btns"><button class="btn" onclick="saveEditProduct(${p.id})">Guardar cambios</button><button class="btn gray" onclick="setView('productos');closeModal()">Atrás</button><button class="btn danger" onclick="deleteProduct(${p.id});closeModal()">Eliminar producto</button></div><hr><h3 style="font-size:24px">Fotos del producto</h3><div class="img-grid">${productImagesHtml(p)}</div><div class="stack-actions" style="margin-top:12px"><button class="btn dark small" onclick="morePhotos.click()">Galería</button><button class="btn dark small" onclick="moreCamera.click()">Tomar foto</button></div><input id="morePhotos" type="file" accept="image/*" multiple hidden><input id="moreCamera" type="file" accept="image/*" capture="environment" multiple hidden><button class="btn dark" style="margin-top:10px" onclick="addPhotos(${p.id})">Agregar fotos</button>`)}
async function saveEditProduct(id){showLoad('Actualizando...');try{await api('/api/products/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:eName.value,brand:eBrand.value,barcode:eBarcode.value,reference:eReference.value,presentation:ePres.value,category:eCategory.value,stock:eStock.value,min_stock:eMinStock.value,real_price:eRealPrice.value,sale_price:ePrice.value,expiration_date:eExp.value,notes:eNotes.value})});closeModal();await load();setView('productos')}finally{hideLoad()}}
async function addPhotos(id){let fd=new FormData();[...morePhotos.files,...moreCamera.files].forEach(f=>fd.append('photos',f));showLoad('Subiendo fotos...');try{await api('/api/products/'+id+'/photos',{method:'POST',body:fd});toast('Fotos agregadas');closeModal();await load();setView('productos')}finally{hideLoad()}}
async function deleteProductImage(pid,imgId){if(!confirm('¿Eliminar foto?'))return;await api('/api/products/'+pid+'/photos/'+imgId,{method:'DELETE'});let r=await api('/api/products/search?q='+encodeURIComponent(pid));closeModal();await load();setView('productos')}
async function setMainImage(pid,imgId){await api('/api/products/'+pid+'/photos/'+imgId+'/main',{method:'POST'});toast('Foto principal actualizada');closeModal();await load();setView('productos')}
async function deleteProduct(id){if(!confirm('¿Eliminar producto?'))return;await api('/api/products/'+id,{method:'DELETE'});await load();setView('productos')}

async function stockMove(id,type){let q=prompt(type=='CARGA'?'Cantidad a cargar':'Cantidad a descargar','1');if(!q)return;await api('/api/products/'+id+'/stock',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type,quantity:q})});await load();setView('productos')}
async function scanIntoField(fieldId){if(!window.Html5Qrcode){toast('Lector no cargado');return}modal(`<h3>Escanear código de barras</h3><div id="fieldReader"></div><div class="btns"><button class="btn gray" onclick="stopFieldScanner()">Atrás</button></div>`);window._fieldScanner=new Html5Qrcode('fieldReader');try{await window._fieldScanner.start({facingMode:'environment'},{fps:10,qrbox:{width:260,height:160}},txt=>{qs('#'+fieldId).value=txt;stopFieldScanner();toast('Código capturado')})}catch(e){toast('No se pudo abrir la cámara')}}
function stopFieldScanner(){if(window._fieldScanner){window._fieldScanner.stop().catch(()=>{});window._fieldScanner=null}closeModal()}
function renderScanner(c){c.innerHTML=`<div class="hero"><div class="eyebrow">SCANER / CÁMARA</div><h3>Buscar precio por imagen o código</h3><p class="muted">Puedes escanear código de barras, tomar foto, subir imagen desde galería o buscar manualmente.</p><div class="btns"><button class="btn" onclick="startBarcode()">⌗ Lector de código</button><button class="btn dark" onclick="scanPhoto.click()">▧ Subir foto galería</button><button class="btn dark" onclick="capturePhoto.click()">📷 Tomar foto</button><button class="btn dark" onclick="openLens()">◎ Cámara Google / Lens</button><button class="btn gray" onclick="setView('inicio')">Atrás</button></div><input id="scanPhoto" hidden type="file" accept="image/*" onchange="scanImage(this.files[0])"><input id="capturePhoto" hidden type="file" accept="image/*" capture="environment" onchange="scanImage(this.files[0])"><div id="reader"></div><hr><label>Buscar por nombre, código de barras, código interno o referencia</label><input id="searchBox" placeholder="Ej: Coca, 775..., BOD-000001"><div class="btns"><button class="btn" onclick="textSearch()">Buscar</button><button class="btn gray" onclick="scannerResult.innerHTML=''">Limpiar</button></div></div><div id="scannerResult"></div>${renderFooterHTML()}`}
function openLens(){window.open('https://lens.google.com/','_blank')}
async function startBarcode(){if(!window.Html5Qrcode){toast('Cargando lector, intenta de nuevo');return}try{scanner=new Html5Qrcode('reader');await scanner.start({facingMode:'environment'},{fps:10,qrbox:{width:260,height:160}},txt=>{if(scanner){scanner.stop();scanner=null}searchBox.value=txt;textSearch()})}catch(e){toast('No se pudo abrir cámara: '+e.message)}}
async function scanImage(file){if(!file)return;showLoad('Comparando imagen con productos...');try{let fd=new FormData();fd.append('file',file);let r=await api('/api/scan-image',{method:'POST',body:fd});if(r.match)showProductResult(r.product,r.score);else qs('#scannerResult').innerHTML=`<div class="card"><h3>No hay coincidencia</h3><p class="muted">La imagen no se parece a los productos registrados.</p>${r.captured_url?`<img class="thumb" src="${r.captured_url}">`:''}</div>`}catch(e){toast(e.message)}finally{hideLoad()}}
async function textSearch(){showLoad('Buscando producto...');try{let r=await api('/api/products/search?q='+encodeURIComponent(searchBox.value));if(r.products.length)showProductResult(r.products[0],100);else qs('#scannerResult').innerHTML='<div class="card"><h3>No encontrado</h3><p class="muted">No hay producto con ese dato.</p></div>'}finally{hideLoad()}}
function showProductResult(p,score){qs('#scannerResult').innerHTML=`<div class="result-card"><div class="result-img"><img src="${p.image_url||''}" onerror="this.style.display='none'"></div><div class="result-body"><div class="eyebrow">RECONOCIMIENTO ${score?score+'%':''}</div><div class="data-row"><div class="data-box"><b>Código / SKU</b>${p.barcode||p.internal_code||'-'}</div><div class="data-box"><b>Producto</b>${p.display_name}</div></div><div style="margin-top:14px" class="data-box"><b>Precio venta</b><div class="price">${money(p.sale_price)}</div></div><div class="btns"><button class="btn" onclick='addCart(${JSON.stringify(p).replaceAll("'","&#39;")})'>＋ Carrito</button><button class="btn dark" onclick="stockMove(${p.id},'CARGA')">Cargar stock</button><button class="btn dark" onclick="stockMove(${p.id},'DESCARGA')">Descargar stock</button></div></div></div>`}
function renderPOS(c){c.innerHTML=`<div class="hero"><div class="eyebrow">PUNTO DE VENTA</div><h3>Venta rápida</h3><label>Buscar producto</label><input id="posSearch" placeholder="Nombre, código de barras o referencia"><div class="btns"><button class="btn" onclick="posSearchProduct()">Buscar</button><button class="btn dark" onclick="startPOSScanner()">⌗ Scaner</button><button class="btn dark" onclick="posPhoto.click()">▧ Foto / galería</button><button class="btn gray" onclick="setView('inicio')">Atrás</button></div><input id="posPhoto" hidden type="file" accept="image/*" capture="environment" onchange="scanImageForPOS(this.files[0])"><div id="posResults"></div></div><div class="card"><h3>Carrito</h3><div id="cartList"></div><label>Nombre cliente</label><input id="saleCustomer" placeholder="Cliente"><label>Celular WhatsApp</label><input id="salePhone" placeholder="929920283"><label>Método de pago</label><select id="saleMethod"><option>Efectivo</option><option>Yape</option><option>Plin</option></select><div class="price" id="cartTotal">S/ 0.00</div><div class="btns"><button class="btn" onclick="finishSale()">Pagar y generar ticket</button><button class="btn gray" onclick="setView('inicio')">Atrás</button></div></div>${renderFooterHTML()}`;renderCart()}
async function posSearchProduct(){let r=await api('/api/products/search?q='+encodeURIComponent(posSearch.value));posResults.innerHTML=r.products.map(p=>`<div class="card product-card"><img class="thumb" src="${p.image_url||''}" onerror="this.style.display='none'"><div><b>${p.display_name}</b><div class="muted-small">Código: ${p.barcode||p.internal_code||'-'} · Stock: ${p.stock}</div><div class="price">${money(p.sale_price)}</div><button class="btn small" onclick='addCart(${JSON.stringify(p).replaceAll("'","&#39;")})'>Agregar al carrito</button></div></div>`).join('')||'<div class="card"><h3 style="font-size:24px">No encontrado</h3><p class="muted">Escanea, sube foto o escribe otro dato.</p></div>'}
function addCart(p){let it=cart.find(x=>x.product_id==p.id);if(it)it.quantity++;else cart.push({product_id:p.id,product_name:p.display_name,unit_price:p.sale_price,quantity:1});toast('Agregado al carrito');if(current=='pos')renderCart()}
function renderCart(){let el=qs('#cartList');if(!el)return;el.innerHTML=cart.map((i,n)=>`<div class="cart-row"><b>${i.product_name}</b><input type="number" value="${i.quantity}" onchange="cart[${n}].quantity=Number(this.value);renderCart()"><span>${money(i.unit_price*i.quantity)}</span><button class="btn small danger" onclick="cart.splice(${n},1);renderCart()">X</button></div>`).join('')||'<p class="muted">Carrito vacío</p>';let total=cart.reduce((s,i)=>s+i.unit_price*i.quantity,0);qs('#cartTotal').textContent=money(total)}
async function finishSale(){if(!cart.length){toast('Carrito vacío');return}showLoad('Generando venta y ticket...');try{let r=await api('/api/sales',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({items:cart,customer_name:saleCustomer.value,customer_phone:salePhone.value,payment_method:saleMethod.value})});cart=[];modal(`<h3>Venta registrada</h3><div class="price">${money(r.total)}</div><p class="muted">Primero descarga el PDF, luego abre WhatsApp para enviarlo.</p><div class="btns"><a class="btn" href="${r.pdf_url}" target="_blank">Descargar ticket PDF</a>${r.whatsapp_url?`<a class="btn dark" href="${r.whatsapp_url}" target="_blank">Abrir WhatsApp</a>`:''}<button class="btn gray" onclick="closeModal();load();setView('pos')">Cerrar</button></div>`)}finally{hideLoad()}}
function renderCredits(c){c.innerHTML=`<div class="hero"><div class="eyebrow">CRÉDITOS / CUENTAS</div><h3>Clientes que fían</h3><div class="formgrid"><input id="creditName" placeholder="Nombre del cliente"><input id="creditPhone" placeholder="WhatsApp"></div><div class="btns"><button class="btn" onclick="createCredit()">Agregar cliente</button><button class="btn gray" onclick="setView('inicio')">Atrás</button></div></div><div class="cards">${STATE.credits.map(cr=>`<div class="card"><h3 style="font-size:30px">${cr.name}</h3><p class="muted">${cr.whatsapp||''}</p><div class="price">${money(cr.total_current)}</div><div class="btns"><button class="btn" onclick="openCredit(${cr.id})">Abrir</button><button class="btn danger" onclick="deleteCredit(${cr.id})">Eliminar</button></div></div>`).join('')||'<div class="card">Sin cuentas de crédito.</div>'}</div>${renderFooterHTML()}`}
async function createCredit(){await api('/api/credits/customers',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:creditName.value,whatsapp:creditPhone.value})});await load();setView('creditos')}
async function openCredit(id){let r=await api('/api/credits/customers/'+id),c=r.customer;modal(`<h3>${c.name}</h3><div class="readonly-note">El link público es individual para este cliente. Desde el panel puedes editar la deuda; el cliente solo puede leer su detalle desde el link.</div><div class="copyline"><b>Link público:</b> <code>${c.public_url}</code> <button class="btn small gray" onclick="navigator.clipboard.writeText(${JSON.stringify(c.public_url)});toast('Link copiado')">Copiar</button></div><div class="price">Total: ${money(c.total_current)}</div><div class="btns"><button class="btn" onclick="creditItemForm(${c.id})">Agregar fiado</button><a class="btn dark" href="${c.pdf_url}" target="_blank">PDF descargable</a><a class="btn dark" href="https://wa.me/${c.whatsapp}?text=${encodeURIComponent('Detalle de deuda '+c.name+': Total '+money(c.total_current)+'. Link: '+c.public_url)}" target="_blank">WhatsApp</a><button class="btn warn" onclick="markPaid(${c.id})">Marcar pagado</button><button class="btn gray" onclick="closeModal()">Atrás</button></div><h3 style="font-size:24px">Detalle actual</h3><div>${c.items.map(i=>`<div class="credit-row"><b>${i.product_name} ${i.brand||''}</b><span>${i.quantity}</span><span>${money(i.total)}</span><span><button class="btn small" onclick='editCreditItem(${JSON.stringify(i).replaceAll("'","&#39;")},${c.id})'>Editar</button><button class="btn small danger" onclick="deleteCreditItem(${i.id},${c.id})">Eliminar</button></span></div>`).join('')||'<p class="muted">Sin productos fiados.</p>'}</div><h3 style="font-size:24px">Historial pagado</h3>${c.paid_history.map(p=>`<p><a style="color:var(--neon)" href="${p.pdf_url}" target="_blank">Pago ${money(p.total_paid)} - ${p.created_at}</a></p>`).join('')||'<p class="muted">Sin historial.</p>'}`)}
function creditItemForm(cid){modal(`<h3>Agregar fiado</h3><label>Buscar producto</label><input id="ciSearch" placeholder="Nombre, código de barras o referencia"><div class="btns"><button class="btn small" onclick="ciFind(${cid})">Buscar</button><button class="btn small dark" onclick="startCreditScanner(${cid})">⌗ Scaner</button><button class="btn small dark" onclick="ciPhoto.click()">▧ Foto / galería</button></div><input id="ciPhoto" hidden type="file" accept="image/*" capture="environment" onchange="scanImageForCredit(this.files[0],${cid})"><div id="ciScanBox"></div><div id="ciResult"></div><label>Producto manual</label><input id="ciName"><label>Marca</label><input id="ciBrand"><label>Cantidad</label><input id="ciQty" type="number" value="1"><label>Precio unitario</label><input id="ciPrice" type="number" value="0"><label>Quién recoge</label><input id="ciPick"><div class="btns"><button class="btn" onclick="saveCreditItem(${cid})">Guardar fiado</button><button class="btn gray" onclick="openCredit(${cid})">Atrás</button></div>`)}
async function ciFind(cid){let r=await api('/api/products/search?q='+encodeURIComponent(ciSearch.value));ciResult.innerHTML=r.products.map(p=>`<div class="card product-card"><img class="thumb" src="${p.image_url||''}" onerror="this.style.display='none'"><div><b>${p.display_name}</b><div class="muted-small">Código: ${p.barcode||p.internal_code||'-'} · Stock: ${p.stock}</div><div class="price">${money(p.sale_price)}</div><button class="btn small" onclick='fillCreditProduct(${JSON.stringify(p).replaceAll("'","&#39;")})'>Usar para fiado</button></div></div>`).join('')||'<div class="card"><p class="muted">No se encontró producto.</p></div>'}
function fillCreditProduct(p){ciName.value=p.name||p.display_name||'';ciBrand.value=p.brand||'';ciPrice.value=p.sale_price||0;ciName.dataset.pid=p.id||'';ciResult.innerHTML=`<div class="card product-card"><img class="thumb" src="${p.image_url||''}" onerror="this.style.display='none'"><div><b>${p.display_name||p.name}</b><div class="muted-small">Producto seleccionado para fiado</div><div class="price">${money(p.sale_price)}</div></div></div>`}
async function startPOSScanner(){if(!window.Html5Qrcode){toast('Lector no cargado');return}posResults.innerHTML='<div class="card"><h3 style="font-size:22px">Escanea el código del producto</h3><div id="posReader"></div><button class="btn gray" onclick="stopInlineScanner()">Atrás</button></div>';window._inlineScanner=new Html5Qrcode('posReader');try{await window._inlineScanner.start({facingMode:'environment'},{fps:10,qrbox:{width:260,height:160}},txt=>{stopInlineScanner();posSearch.value=txt;posSearchProduct();toast('Código capturado')})}catch(e){toast('No se pudo abrir la cámara')}}
async function startCreditScanner(cid){if(!window.Html5Qrcode){toast('Lector no cargado');return}ciScanBox.innerHTML='<div class="card"><h3 style="font-size:22px">Escanea el código del producto</h3><div id="creditReader"></div><button class="btn gray" onclick="stopInlineScanner()">Atrás</button></div>';window._inlineScanner=new Html5Qrcode('creditReader');try{await window._inlineScanner.start({facingMode:'environment'},{fps:10,qrbox:{width:260,height:160}},txt=>{stopInlineScanner();ciSearch.value=txt;ciFind(cid);toast('Código capturado')})}catch(e){toast('No se pudo abrir la cámara')}}
function stopInlineScanner(){if(window._inlineScanner){window._inlineScanner.stop().catch(()=>{});window._inlineScanner=null}let a=qs('#posResults');let b=qs('#ciScanBox');if(b)b.innerHTML=''}
async function scanImageForPOS(file){if(!file)return;showLoad('Comparando foto con productos...');try{let fd=new FormData();fd.append('file',file);let r=await api('/api/scan-image',{method:'POST',body:fd});if(r.match){let p=r.product;posResults.innerHTML=`<div class="card product-card"><img class="thumb" src="${p.image_url||''}" onerror="this.style.display='none'"><div><b>${p.display_name}</b><div class="muted-small">Coincidencia por imagen ${r.score||''}%</div><div class="price">${money(p.sale_price)}</div><button class="btn small" onclick='addCart(${JSON.stringify(p).replaceAll("'","&#39;")})'>Agregar al carrito</button></div></div>`}else posResults.innerHTML='<div class="card"><h3 style="font-size:24px">Sin coincidencia</h3><p class="muted">No se encontró un producto parecido.</p></div>'}finally{hideLoad()}}
async function scanImageForCredit(file,cid){if(!file)return;showLoad('Comparando foto con productos...');try{let fd=new FormData();fd.append('file',file);let r=await api('/api/scan-image',{method:'POST',body:fd});if(r.match){fillCreditProduct(r.product)}else ciResult.innerHTML='<div class="card"><h3 style="font-size:24px">Sin coincidencia</h3><p class="muted">No se encontró un producto parecido.</p></div>'}finally{hideLoad()}}

async function saveCreditItem(cid){await api('/api/credits/customers/'+cid+'/items',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({product_id:ciName.dataset.pid||null,product_name:ciName.value,brand:ciBrand.value,quantity:ciQty.value,unit_price:ciPrice.value,picked_by:ciPick.value})});await load();openCredit(cid)}
function editCreditItem(i,cid){modal(`<h3>Editar fiado</h3><label>Producto</label><input id="eiName" value="${i.product_name}"><label>Marca</label><input id="eiBrand" value="${i.brand||''}"><label>Cantidad</label><input id="eiQty" type="number" value="${i.quantity}"><label>Precio unitario</label><input id="eiPrice" type="number" value="${i.unit_price}"><label>Quién recoge</label><input id="eiPick" value="${i.picked_by||''}"><div class="btns"><button class="btn" onclick="saveEditCredit(${i.id},${cid})">Guardar</button><button class="btn gray" onclick="openCredit(${cid})">Atrás</button></div>`)}
async function saveEditCredit(id,cid){await api('/api/credits/items/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({product_name:eiName.value,brand:eiBrand.value,quantity:eiQty.value,unit_price:eiPrice.value,picked_by:eiPick.value})});await load();openCredit(cid)}
async function deleteCreditItem(id,cid){if(confirm('¿Eliminar item?')){await api('/api/credits/items/'+id,{method:'DELETE'});await load();openCredit(cid)}}
async function markPaid(cid){if(confirm('¿Marcar deuda como pagada?')){let r=await api('/api/credits/customers/'+cid+'/paid',{method:'POST'});toast('Cuenta cerrada');await load();openCredit(cid)}}
async function deleteCredit(id){if(confirm('¿Eliminar cuenta?')){await api('/api/credits/customers/'+id,{method:'DELETE'});await load();setView('creditos')}}
function renderPayments(c){c.innerHTML=`<div class="hero"><div class="eyebrow">PAGOS / QR</div><h3>Medios de pago</h3><form id="payForm"><div class="formgrid"><input name="label" placeholder="Etiqueta: Yape principal"><select name="method"><option>Yape</option><option>Plin</option><option>Transferencia</option></select><input name="holder_name" placeholder="Titular"><input name="phone" placeholder="Número"><input name="qr" type="file" accept="image/*"></div><label>Mensaje visible</label><textarea name="message" placeholder="Escanea este QR y paga con Yape o Plin"></textarea><div class="btns"><button class="btn">Guardar QR</button><button type="button" class="btn gray" onclick="setView('inicio')">Atrás</button></div></form></div><div class="cards">${STATE.payments.map(p=>`<div class="card"><h3 style="font-size:24px">${p.label}</h3>${p.qr_url?`<img src="${p.qr_url}" style="width:100%;max-height:260px;object-fit:contain;background:white;border-radius:20px">`:'<div class="data-box">QR no configurado</div>'}<p><b>${p.holder_name}</b><br>${p.method} | ${p.phone}</p><div class="muted-small">${p.message||''}</div><div class="btns"><button class="btn small" onclick='prefillPayment(${JSON.stringify(p).replaceAll("'","&#39;")})'>Editar</button><button class="btn small danger" onclick="deletePayment(${p.id})">Eliminar QR</button></div></div>`).join('')}</div>${renderFooterHTML()}`;payForm.onsubmit=savePayment}
function prefillPayment(p){modal(`<h3>Editar medio de pago</h3><div class="formgrid"><input id="payLabel" value="${p.label||''}"><input id="payMethod" value="${p.method||''}"><input id="payHolder" value="${p.holder_name||''}"><input id="payPhone" value="${p.phone||''}"></div><label>Mensaje</label><textarea id="payMessage">${p.message||''}</textarea><div class="btns"><button class="btn" onclick="updatePayment(${p.id})">Guardar</button><button class="btn gray" onclick="closeModal()">Atrás</button></div>`)}
async function updatePayment(id){await api('/api/payments/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({label:payLabel.value,method:payMethod.value,holder_name:payHolder.value,phone:payPhone.value,message:payMessage.value})});closeModal();await load();setView('pagos')}
async function savePayment(e){e.preventDefault();showLoad('Guardando QR...');try{await api('/api/payments',{method:'POST',body:new FormData(e.target)});await load();setView('pagos')}finally{hideLoad()}}
async function deletePayment(id){if(confirm('¿Eliminar QR?')){await api('/api/payments/'+id,{method:'DELETE'});await load();setView('pagos')}}
function renderAdsInto(id,loc){let ads=STATE.ads.filter(a=>a.location==loc||a.location=='inicio');qs('#'+id).innerHTML=ads.map(ad=>`<div class="card" style="background:${ad.bg_color};color:${ad.text_color}"><h3 style="font-size:24px">${ad.title||'Publicidad'}</h3>${ad.media_url?(ad.media_type=='video'?`<video src="${ad.media_url}" controls style="width:100%;border-radius:18px"></video>`:`<img src="${ad.media_url}" style="width:100%;border-radius:18px">`):''}<p>${ad.text_body||''}</p></div>`).join('')}
function renderAds(){let t=STATE.ads.find(a=>a.display_mode=='ticker'&&a.active!==false);if(t){ticker.style.display='block';tickerText.textContent=(t.title||'Publicidad')+' · '+(t.text_body||'');tickerText.style.animationDuration=(t.speed||14)+'s'}else ticker.style.display='none'}
function renderAdsAdmin(c){c.innerHTML=`<div class="hero"><div class="eyebrow">PUBLICIDAD</div><h3>Banners, videos y letrero LED</h3><form id="adForm"><div class="formgrid"><input name="title" placeholder="Título"><input name="text_body" placeholder="Texto publicitario"><select name="media_type"><option value="texto">Solo texto</option><option value="image">Imagen</option><option value="video">Video</option></select><select name="display_mode"><option value="card">Tarjeta</option><option value="ticker">Letrero LED inferior</option></select><input name="bg_color" type="color" value="#03120b"><input name="text_color" type="color" value="#d9f99d"><input name="media" type="file" accept="image/*,video/*"></div><div class="btns"><button class="btn">Guardar publicidad</button><button type="button" class="btn gray" onclick="setView('inicio')">Atrás</button></div></form></div><div class="cards">${STATE.ads.map(a=>`<div class="card"><b>${a.title||'Publicidad'}</b><p>${a.text_body||''}</p><button class="btn danger" onclick="deleteAd(${a.id})">Eliminar</button></div>`).join('')}</div>${renderFooterHTML()}`;adForm.onsubmit=saveAd}
async function saveAd(e){e.preventDefault();showLoad('Guardando publicidad...');try{await api('/api/ads',{method:'POST',body:new FormData(e.target)});await load();setView('publicidad')}finally{hideLoad()}}
async function deleteAd(id){if(confirm('¿Eliminar publicidad?')){await api('/api/ads/'+id,{method:'DELETE'});await load();setView('publicidad')}}
function renderConfig(c){let s=STATE.settings;c.innerHTML=`<div class="hero"><div class="eyebrow">CONFIGURACIÓN</div><h3>Diseño del sistema</h3><div class="formgrid"><div><label>Nombre del negocio</label><input id="cfgName" value="${s.business_name||''}"></div><div><label>Subtítulo</label><input id="cfgSub" value="${s.subtitle||''}"></div><div><label>Logo texto</label><input id="cfgLogo" value="${s.logo_text||'B'}"></div><div><label>WhatsApp soporte</label><input id="cfgSupport" value="${s.support_whatsapp||''}"></div><div><label>Color neón</label><input type="color" id="cfgColor" value="${s.primary_color||'#20ff29'}"></div><div><label>Color texto</label><input type="color" id="cfgText" value="${s.text_color||'#d6dde7'}"></div></div><label>Footer</label><textarea id="cfgFooter">${s.footer||''}</textarea><div class="btns"><button class="btn" onclick="saveConfig()">Guardar configuración</button><button class="btn gray" onclick="setView('inicio')">Atrás</button></div></div>${renderFooterHTML()}`}
async function saveConfig(){await api('/api/settings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({business_name:cfgName.value,subtitle:cfgSub.value,logo_text:cfgLogo.value,support_whatsapp:cfgSupport.value,primary_color:cfgColor.value,text_color:cfgText.value,footer:cfgFooter.value})});await load();setView('config')}
function modal(html){qs('#modalContent').innerHTML=html;qs('#modal').classList.add('show')}function closeModal(){qs('#modal').classList.remove('show')}qs('#modal').onclick=e=>{if(e.target.id=='modal')closeModal()}
load();
</script>
</body></html>
