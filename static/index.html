<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Bodetronic Python Pro - Cámara y Código de Barras</title>
<style>
:root{
  --p:#00A6A6;--g:#22c55e;--s:#0F172A;--bg:#ECFEFF;--card:#fff;--line:#D7EEF0;
  --text:#111827;--muted:#667085;--danger:#ef4444;--warn:#f59e0b;--radius:22px;--font:16px
}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:var(--font);overflow-x:hidden}
button{border:0;border-radius:16px;padding:12px 15px;font-weight:900;cursor:pointer;font-size:15px}
input,select,textarea{width:100%;border:1px solid var(--line);border-radius:16px;padding:13px;margin:6px 0 12px;background:#fff;font-size:16px}
textarea{min-height:90px}
label{font-weight:900;display:block;margin-top:6px}
a{text-decoration:none}
.btn{background:#e8eef5;color:var(--text)}.primary{background:linear-gradient(135deg,var(--p),#22c55e);color:#fff}.dark{background:var(--s);color:#fff}.red{background:var(--danger);color:#fff}.orange{background:var(--warn);color:#fff}.green{background:#22c55e;color:#fff}
.small{padding:8px 11px;font-size:13px;border-radius:12px}.full{width:100%}.hide{display:none!important}.muted{color:var(--muted)}.price{font-size:34px;font-weight:1000;color:var(--p);line-height:1}
.login-wrap{min-height:100vh;display:grid;place-items:center;padding:22px;background:radial-gradient(circle at 18% 16%,#d7fff7,transparent 28%),radial-gradient(circle at 80% 10%,#dbeafe,transparent 24%),var(--bg)}
.login-card{width:min(470px,94vw);background:white;border:1px solid var(--line);border-radius:28px;padding:28px;box-shadow:0 26px 70px rgba(15,23,42,.12)}
.brand{display:flex;gap:16px;align-items:center}.logo{width:70px;height:70px;border-radius:22px;background:linear-gradient(135deg,var(--p),#22c55e);color:white;display:grid;place-items:center;font-size:36px;font-weight:1000;overflow:hidden}.logo img{width:100%;height:100%;object-fit:cover}
.brand h1{font-size:42px;margin:0}.brand p{margin:5px 0 0;color:var(--muted)}
.layout{display:grid;grid-template-columns:290px 1fr;min-height:100vh}.sidebar{background:var(--s);color:white;padding:18px;position:sticky;top:0;height:100vh;overflow:auto}.sidebar h2{margin:0 0 4px}.sidebar small{color:#9fb6c8}
.nav-title{font-size:12px;letter-spacing:3px;color:#69e8dd;margin:22px 0 10px}.nav-btn{display:flex;align-items:center;gap:10px;width:100%;background:transparent;color:#dbeafe;text-align:left;margin:4px 0;padding:13px;border-radius:14px}.nav-btn.active,.nav-btn:hover{background:rgba(0,166,166,.22);box-shadow:inset 3px 0 0 var(--p)}
.main{min-width:0}.topbar{min-height:84px;background:white;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;padding:14px 24px;position:sticky;top:0;z-index:4}.hamb{display:none}.topbar h2{margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.topbar p{margin:2px 0 0;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.spacer{flex:1}
.page{padding:22px;max-width:1300px;margin:auto}.card{background:white;border:1px solid var(--line);border-radius:var(--radius);padding:24px;margin:14px 0;box-shadow:0 14px 38px rgba(15,23,42,.07)}.soft{background:rgba(255,255,255,.78);backdrop-filter:blur(10px)}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.stats{font-size:38px;font-weight:1000;color:var(--p);margin-top:8px}.pill{display:inline-flex;gap:6px;align-items:center;border-radius:999px;padding:7px 12px;background:#e8f8f8;color:#075e65;font-weight:900;margin:4px}
.list-card{border:1px solid var(--line);border-radius:20px;padding:18px;margin:12px 0;background:#fff}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.product{display:grid;grid-template-columns:92px 1fr;gap:16px;align-items:start;border:1px solid var(--line);border-radius:22px;padding:16px;margin:12px 0;background:white}.pimg{width:92px;height:92px;border-radius:18px;background:#e8eef5;display:grid;place-items:center;color:#64748b;font-weight:1000;overflow:hidden}.pimg img{width:100%;height:100%;object-fit:cover}
table{width:100%;border-collapse:collapse}th,td{padding:10px;border-bottom:1px solid #e5e7eb;text-align:left}.total-box{background:#ecfeff;border:1px solid #b7f1ef;border-radius:20px;padding:18px;margin:10px 0}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#0f172a;color:white;padding:13px 18px;border-radius:16px;box-shadow:0 18px 40px #0004;z-index:20;max-width:90vw}.toast.bad{background:#7f1d1d}.toast.ok{background:#065f46}
.loading{position:fixed;inset:0;display:none;place-items:center;background:rgba(236,254,255,.78);backdrop-filter:blur(8px);z-index:30}.loading.show{display:grid}.spinner{width:76px;height:76px;border-radius:50%;border:12px solid #c9fff5;border-top-color:var(--p);animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.loading h3{text-align:center}
.modal{position:fixed;inset:0;background:rgba(15,23,42,.58);display:none;align-items:center;justify-content:center;z-index:25;padding:18px}.modal.show{display:flex}.modal-box{width:min(760px,96vw);max-height:88vh;overflow:auto;background:white;border-radius:28px;padding:24px;box-shadow:0 26px 80px rgba(0,0,0,.3)}
.photo-box,.scan-box{border:1px solid var(--line);border-radius:18px;padding:14px;background:#f8fafc;margin:10px 0}.photo-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-top:10px}.photo-item{border:1px solid var(--line);border-radius:16px;padding:8px;background:white;text-align:center}.photo-item img{width:100%;height:88px;object-fit:cover;border-radius:12px}.photo-item b{display:block;font-size:12px;margin-top:4px}
.compare-img{width:100%;max-height:260px;object-fit:contain;border-radius:18px;border:1px solid var(--line);background:#f8fafc}.barcode-ok{background:#ecfeff;border:1px solid #99f6e4;border-radius:18px;padding:12px;margin:10px 0}.barcode-bad{background:#fff7ed;border:1px solid #fed7aa;border-radius:18px;padding:12px;margin:10px 0}.ad-lower{border-radius:16px;margin:12px 0;padding:10px 14px;font-weight:900;box-shadow:0 12px 32px rgba(15,23,42,.12)}
.client-hero{display:flex;gap:18px;align-items:center}.hero-logo{width:86px;height:86px;border-radius:24px;background:linear-gradient(135deg,var(--p),#22c55e);display:grid;place-items:center;color:white;font-size:36px;font-weight:1000;overflow:hidden}.hero-logo img{width:100%;height:100%;object-fit:cover}.hero-chip{display:inline-block;border-radius:999px;padding:7px 10px;background:#e8f8f8;color:#075e65;font-weight:900;margin:4px}
.qr-card{border:1px solid var(--line);border-radius:22px;padding:18px;background:#fff;margin:12px 0}.qr-card img{width:100%;max-height:280px;object-fit:contain;border-radius:18px;background:#f8fafc;border:1px solid var(--line)}
.hidden-input{display:none}
@media(max-width:860px){
  .layout{grid-template-columns:1fr}.sidebar{position:fixed;left:-310px;top:0;width:290px;z-index:10;transition:.25s}.sidebar.open{left:0}.hamb{display:inline-grid}
  .grid,.grid2{grid-template-columns:1fr}.topbar{display:grid;grid-template-columns:58px minmax(0,1fr) 78px;gap:8px;padding:10px 8px}.topbar .hamb{width:58px;height:58px;padding:0;place-items:center}.topbar .spacer{display:none}.topbar>button.dark{width:78px;padding:12px 8px}.page{padding:14px}.brand h1{font-size:34px}.product{grid-template-columns:1fr}.pimg{width:120px;height:120px}.client-hero{align-items:flex-start}.topbar h2{font-size:24px}.topbar p{font-size:13px}
}
</style>
</head>
<body>
<div id="loading" class="loading"><div><div class="spinner"></div><h3 id="loadingText">Cargando...</h3></div></div>
<div id="modal" class="modal"><div class="modal-box"><div id="modalContent"></div></div></div>
<div id="toast" class="toast hide"></div>

<section id="login" class="login-wrap">
  <div class="login-card">
    <div class="brand">
      <div class="logo" id="loginLogo">B</div>
      <div><h1>Bodetronic</h1><p>Inventario, registro y precios</p></div>
    </div>
    <div id="loginMsg"></div>
    <label>Usuario</label><input id="loginUser" placeholder="Usuario" autocomplete="username">
    <label>Contraseña</label><input id="loginPass" placeholder="Contraseña" type="password" autocomplete="current-password">
    <button class="primary full" onclick="login()">Ingresar</button>
    <div style="text-align:center;margin-top:22px">
      <button class="primary" onclick="openSupport()">Soporte WhatsApp</button>
      <p class="muted">AeroxLab<br>WEB DEVELOPER TEAM<br>© 2025-2026 Aerox Security Consulting LLC<br>Derechos reservados | Políticas de privacidad</p>
    </div>
  </div>
</section>

<section id="app" class="layout hide">
  <aside id="sidebar" class="sidebar">
    <div class="brand" style="gap:10px;margin-bottom:18px">
      <div class="logo" id="sideLogo" style="width:48px;height:48px;font-size:25px">B</div>
      <div><h2>Bodetronic</h2><small id="sideSub">Panel</small></div>
    </div>
    <div id="menu"></div>
  </aside>
  <main class="main">
    <header class="topbar">
      <button class="hamb btn" onclick="toggleMenu()">☰</button>
      <div><h2 id="pageTitle">Dashboard</h2><p id="pageSub">Bodetronic CRM</p></div>
      <div class="spacer"></div>
      <button class="dark" onclick="logout()">Salir</button>
    </header>
    <div id="view" class="page"></div>
  </main>
</section>

<script>
let TOKEN="", ROLE="", CLIENT=null, ADMIN_DATA=[], BUNDLE=null, PRODUCTS=[], CART=[], CURRENT_CREDIT=null, PRODUCT_PHOTOS=[], LAST_SCANNED_BARCODE="";
const SERVICE_LABELS={bodega:"Bodega",bodega_pos:"Bodega - Punto de venta",bodega_credits:"Bodega - Créditos/Cuentas",bodega_expirations:"Bodega - Vencimientos",minimarket:"Minimarket",minimarket_pos:"Minimarket - Punto de venta",minimarket_credits:"Minimarket - Créditos/Cuentas",minimarket_expirations:"Minimarket - Vencimientos",almacen:"Almacén",almacen_picking:"Almacén - Picking",almacen_pos:"Almacén - Punto de venta"};

function el(id){return document.getElementById(id)}
function money(n){return "S/ "+Number(n||0).toFixed(2)}
function safe(s){return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]))}
function showLoad(t="Cargando..."){el("loadingText").textContent=t;el("loading").classList.add("show")}
function hideLoad(){el("loading").classList.remove("show")}
function toast(t,type="ok"){const x=el("toast");x.textContent=t;x.className="toast "+type;setTimeout(()=>x.classList.add("hide"),3200)}
function modal(html){el("modalContent").innerHTML=html;el("modal").classList.add("show")}
function closeModal(){el("modal").classList.remove("show")}
function confirmBox(title,msg,yes){modal(`<h2>${safe(title)}</h2><p>${safe(msg)}</p><div class="actions"><button class="red" onclick="closeModal()">Cancelar</button><button class="primary" onclick="closeModal();${yes}">Confirmar</button></div>`)}
function toggleMenu(){el("sidebar").classList.toggle("open")}
function setTitle(t,s=""){el("pageTitle").textContent=t;el("pageSub").textContent=s||"Bodetronic CRM | AeroxLab";if(innerWidth<860)el("sidebar").classList.remove("open")}
function openSupport(){window.open("https://wa.me/51992657332?text="+encodeURIComponent("Necesito soporte para mi sistema"),"_blank")}
function absUrl(u){if(!u)return "";return String(u).startsWith("/")?location.origin+u:u}
function waNumber(n){let x=String(n||"").replace(/\D/g,"");if(x.length===9)x="51"+x;return x}
function copyText(t){navigator.clipboard?.writeText(String(t||""));toast("Copiado","ok")}
function productName(p){const name=String(p?.display_name||p?.name||"").trim();const brand=String(p?.brand||"").trim();if(!brand||name.toLowerCase().includes(brand.toLowerCase()))return name;const m=name.match(/\b\d/);if(m){const i=m.index;return [name.slice(0,i).trim(),brand,name.slice(i).trim()].filter(Boolean).join(" ")}return(name+" "+brand).trim()}

async function api(path,opts={}){
  opts.headers=opts.headers||{};
  if(!(opts.body instanceof FormData))opts.headers["Content-Type"]="application/json";
  if(TOKEN)opts.headers.Authorization="Bearer "+TOKEN;
  const r=await fetch(path,opts);
  if(r.status===401){localStorage.removeItem("BT_TOKEN");localStorage.removeItem("BT_ROLE");localStorage.removeItem("BT_CLIENT");throw new Error("Tu sesión venció. Vuelve a ingresar.")}
  const ct=r.headers.get("content-type")||"";
  if(ct.includes("application/json"))return await r.json();
  return {ok:r.ok,text:await r.text()};
}
function logout(){localStorage.removeItem("BT_TOKEN");localStorage.removeItem("BT_ROLE");localStorage.removeItem("BT_CLIENT");location.reload()}

async function login(){
  showLoad("Verificando acceso...");
  try{
    const r=await api("/api/auth/login",{method:"POST",body:JSON.stringify({username:el("loginUser").value.trim(),password:el("loginPass").value.trim()})});
    if(!r.ok){el("loginMsg").innerHTML=`<div class="card" style="background:#fee2e2;color:#991b1b">${safe(r.error||"Credenciales incorrectas")}</div>`;hideLoad();return}
    TOKEN=r.token;ROLE=r.role;CLIENT=r.client||null;
    localStorage.setItem("BT_TOKEN",TOKEN);localStorage.setItem("BT_ROLE",ROLE);localStorage.setItem("BT_CLIENT",JSON.stringify(CLIENT||{}));
    el("login").classList.add("hide");el("app").classList.remove("hide");
    if(ROLE==="admin"){adminMenu();await adminDashboard()}else{await loadClient();clientMenu();clientHome()}
  }catch(e){el("loginMsg").innerHTML=`<div class="card" style="background:#fee2e2;color:#991b1b">${safe(e.message)}</div>`}
  hideLoad();
}
window.addEventListener("load",async()=>{
  TOKEN=localStorage.getItem("BT_TOKEN")||"";ROLE=localStorage.getItem("BT_ROLE")||"";
  try{CLIENT=JSON.parse(localStorage.getItem("BT_CLIENT")||"{}")}catch(e){}
  if(TOKEN&&ROLE){
    try{el("login").classList.add("hide");el("app").classList.remove("hide");if(ROLE==="admin"){adminMenu();await adminDashboard()}else{await loadClient();clientMenu();clientHome()}}catch(e){hideLoad();toast(e.message||"Sesión vencida","bad");setTimeout(logout,900)}
  }
});

function nav(items){el("menu").innerHTML=items.map(i=>`<button class="nav-btn" onclick="${i.fn}"><span>${i.icon||"•"}</span>${i.t}</button>`).join("")+`<div class="nav-title">SISTEMA</div><button class="nav-btn" onclick="logout()">Salir</button>`}
function adminMenu(){el("sideSub").textContent="Admin maestro";nav([{t:"Dashboard",fn:"adminDashboard()",icon:"▣"},{t:"Clientes CRM",fn:"adminClients()",icon:"▤"},{t:"Crear cliente",fn:"adminCreateClient()",icon:"+"},{t:"Servicios",fn:"adminServices()",icon:"◉"},{t:"Pagos / QR",fn:"adminPayments()",icon:"QR"},{t:"Publicidad/Sponsors",fn:"adminAds()",icon:"AD"}])}
async function refreshAdmin(){const r=await api("/api/admin/clients");ADMIN_DATA=r.clients||[];return ADMIN_DATA}
function clientOptions(){return(ADMIN_DATA||[]).map(c=>`<option value="${c.id}">${safe(c.business_name)} - ${safe(c.owner_name)}</option>`).join("")}

async function adminDashboard(){setTitle("Dashboard","Bodetronic CRM | AeroxLab");showLoad("Actualizando dashboard...");const r=await api("/api/admin/dashboard");hideLoad();el("view").innerHTML=`<div class="grid"><div class="card"><b>Clientes</b><div class="stats">${r.stats.clients}</div></div><div class="card"><b>Activos</b><div class="stats">${r.stats.active}</div></div><div class="card"><b>Vencidos</b><div class="stats">${r.stats.expired}</div></div><div class="card"><b>Productos</b><div class="stats">${r.stats.products}</div></div><div class="card"><b>Ventas</b><div class="stats">${r.stats.sales}</div></div><div class="card"><b>Créditos</b><div class="stats">${money(r.stats.credits_total)}</div></div></div><div class="card"><h2>Accesos rápidos</h2><div class="actions"><button class="primary" onclick="adminCreateClient()">Crear cliente</button><button class="dark" onclick="adminClients()">Ver CRM</button><button class="btn" onclick="adminServices()">Servicios</button></div></div>`}
async function adminClients(){setTitle("Clientes CRM","Revisa accesos, servicios y pagos");showLoad("Cargando CRM...");await refreshAdmin();hideLoad();el("view").innerHTML=`<div class="card"><h1>Clientes registrados</h1><button class="primary" onclick="adminClients()">Actualizar CRM</button>${ADMIN_DATA.length?ADMIN_DATA.map(clientCard).join(""):"<div class='card'>Aún no hay clientes activos.</div>"}</div>`}
function clientCard(c){const activeServices=Object.entries(c.services||{}).filter(([k,v])=>v.active).map(([k])=>SERVICE_LABELS[k]||k).join(", ")||"Sin servicios";return`<div class="list-card"><h2>${safe(c.business_name)}</h2><p class="muted">${safe(c.owner_name)} | ${safe(c.whatsapp)} | ${safe(c.dni_ruc)}</p><span class="pill">${safe(c.status)}</span><span class="pill">${safe(activeServices)}</span><span class="pill">Vence: ${safe(c.access_expires_at)}</span><p>Usuario: <b>${safe(c.access?.username||"")}</b> | Contraseña: <b>${safe(c.access?.password||"")}</b></p><div class="actions"><button class="btn" onclick="copyText('${safe(c.access?.username||"")}')">Copiar usuario</button><button class="btn" onclick="copyText('${safe(c.access?.password||"")}')">Copiar clave</button><button class="orange" onclick="adminServices(${c.id})">Servicios</button><button class="dark" onclick="adminPayments(${c.id})">Pagos</button></div></div>`}
function adminCreateClient(){setTitle("Crear cliente","Alta de clientes y demos");el("view").innerHTML=`<div class="card"><h1>Crear cliente / negocio</h1><div class="grid2"><div><label>Negocio</label><input id="c_business" placeholder="Bodega Chebitas"></div><div><label>Dueño</label><input id="c_owner" placeholder="Nombre del dueño"></div></div><div class="grid2"><div><label>DNI/RUC</label><input id="c_dni"></div><div><label>WhatsApp</label><input id="c_wsp"></div></div><div class="grid2"><div><label>Usuario opcional</label><input id="c_user"></div><div><label>Contraseña opcional</label><input id="c_pass"></div></div><div class="grid2"><div><label>Tipo membresía</label><select id="c_member"><option>Demo</option><option>Mensual</option><option>Anual</option><option>Indefinido</option></select></div><div><label>Duración de acceso</label><div class="grid2"><input id="c_dur_amount" type="number" placeholder="Ej: 2"><select id="c_dur_type"><option value="horas">Horas</option><option value="dias">Días</option><option value="meses">Meses</option><option value="indefinido">Indefinido</option></select></div></div></div><h3>Servicios iniciales</h3><div class="grid">${Object.entries(SERVICE_LABELS).map(([k,v])=>`<label class="list-card"><input type="checkbox" id="svc_${k}"> ${v}</label>`).join("")}</div><button class="primary" onclick="saveNewClient()">Guardar cliente</button></div>`}
async function saveNewClient(){const services={};Object.keys(SERVICE_LABELS).forEach(k=>services[k]=el("svc_"+k)?.checked||false);showLoad("Creando cliente...");const r=await api("/api/admin/clients",{method:"POST",body:JSON.stringify({business_name:el("c_business").value,owner_name:el("c_owner").value,dni_ruc:el("c_dni").value,whatsapp:el("c_wsp").value,username:el("c_user").value,password:el("c_pass").value,membership_type:el("c_member").value,duration_amount:el("c_dur_amount").value,duration_type:el("c_dur_type").value,services})});hideLoad();if(!r.ok){toast(r.error||"No se pudo crear","bad");return}toast(`Cliente creado. Usuario: ${r.username} | Clave: ${r.password}`,"ok");adminClients()}
async function adminServices(selectedId){setTitle("Servicios","Activar servicios por tiempo");showLoad("Cargando clientes...");await refreshAdmin();hideLoad();const first=selectedId||ADMIN_DATA[0]?.id||"";el("view").innerHTML=`<div class="card"><h1>Servicios del cliente</h1><label>Cliente</label><select id="svcClient" onchange="renderServiceChecks()">${clientOptions()}</select><div class="grid2"><div><label>Tiempo de activación</label><input id="svcAmount" type="number" placeholder="Ej: 3"></div><div><label>Unidad</label><select id="svcType"><option value="horas">Horas</option><option value="dias">Días</option><option value="meses">Meses</option><option value="indefinido">Indefinido</option></select></div></div><label><input id="svcDemo" type="checkbox"> Activar como demo/prueba</label><div id="svcChecks" class="grid"></div><button class="primary" onclick="saveServices()">Guardar servicios</button></div>`;el("svcClient").value=first;renderServiceChecks()}
function renderServiceChecks(){const id=Number(el("svcClient").value);const c=(ADMIN_DATA||[]).find(x=>x.id===id)||{};const sm=c.services||{};el("svcChecks").innerHTML=Object.entries(SERVICE_LABELS).map(([k,v])=>`<label class="list-card"><input type="checkbox" id="svcu_${k}" ${sm[k]?.active?"checked":""}> ${v}<br><small class="muted">Vence: ${safe(sm[k]?.expires_at||"INDEFINIDO")}</small></label>`).join("")}
async function saveServices(){const services={};Object.keys(SERVICE_LABELS).forEach(k=>services[k]=el("svcu_"+k).checked);showLoad("Guardando servicios...");await api(`/api/admin/clients/${el("svcClient").value}/services`,{method:"PUT",body:JSON.stringify({services,duration_amount:el("svcAmount").value,duration_type:el("svcType").value,demo:el("svcDemo").checked})});hideLoad();toast("Servicios actualizados");adminServices(Number(el("svcClient").value))}
async function adminPayments(selectedId){setTitle("Pagos / QR","Configurar pagos por cliente");showLoad("Cargando clientes...");await refreshAdmin();hideLoad();const first=selectedId||ADMIN_DATA[0]?.id||"";el("view").innerHTML=`<div class="card"><h1>Pagos / QR</h1><label>Cliente</label><select id="payClient" onchange="loadPayments()">${clientOptions()}</select>${paymentFormHtml()}<button class="primary" onclick="savePayment()">Guardar medio de pago</button><div id="payList"></div></div>`;el("payClient").value=first;loadPayments()}

function clientScanner(){setTitle("Cámara / Scanner","Tomar foto, subir archivo, detectar producto y barras");el("view").innerHTML=`<div class="card"><h1>Cámara / Scanner</h1><p class="muted">Puedes tomar foto del producto, subir una imagen desde galería, escanear código de barras con cámara, subir una foto del código o buscar manualmente.</p><div class="grid2"><div class="scan-box"><h2>Producto por imagen</h2><div class="actions"><button class="primary" onclick="el('scanCam').click()">📷 Tomar foto</button><button class="btn" onclick="el('scanGal').click()">🖼 Subir archivo</button></div><input class="hidden-input" id="scanCam" type="file" accept="image/*" capture="environment" onchange="detectProductFile(this.files[0],'camera')"><input class="hidden-input" id="scanGal" type="file" accept="image/*" onchange="detectProductFile(this.files[0],'gallery')"><p class="muted">Si el producto ya tiene fotos guardadas, el sistema intentará reconocerlo.</p></div><div class="scan-box"><h2>Código de barras</h2><div class="actions"><button class="primary" onclick="el('codeCam').click()">📷 Escanear con cámara</button><button class="btn" onclick="el('codeGal').click()">🖼 Subir foto de barras</button></div><input class="hidden-input" id="codeCam" type="file" accept="image/*" capture="environment" onchange="scanBarcodeAndSearch(this.files[0])"><input class="hidden-input" id="codeGal" type="file" accept="image/*" onchange="scanBarcodeAndSearch(this.files[0])"><p class="muted">También puedes escribir el código manualmente.</p></div></div><hr><label>Buscar manual: nombre, código de barras, código interno o referencia</label><div class="grid2"><input id="scanQ" placeholder="Ej: Coca, BOD-000001, 775..."><button class="primary" onclick="scanSearch()">Buscar</button></div><div id="scanInfo"></div><div id="scanResult"></div></div>`}
async function scanBarcodeFromImage(file){
  if(!file)return "";
  if(!("BarcodeDetector" in window)){
    return "";
  }
  try{
    const formats=["ean_13","ean_8","upc_a","upc_e","code_128","code_39","itf","qr_code"];
    const detector=new BarcodeDetector({formats});
    const img=await fileToImage(file);
    const codes=await detector.detect(img);
    return (codes&&codes[0]&&(codes[0].rawValue||codes[0].data))?String(codes[0].rawValue||codes[0].data).trim():"";
  }catch(e){return ""}
}
function fileToImage(file){return new Promise((resolve,reject)=>{const img=new Image();img.onload=()=>resolve(img);img.onerror=reject;img.src=URL.createObjectURL(file)})}
async function scanBarcodeIntoField(file,fieldId){
  if(!file)return;
  showLoad("Leyendo código de barras...");
  const code=await scanBarcodeFromImage(file);
  hideLoad();
  if(code){el(fieldId).value=code;LAST_SCANNED_BARCODE=code;toast("Código detectado: "+code)}
  else{toast("No se pudo leer automático. Escríbelo manualmente o prueba con una foto más clara.","bad")}
}
async function scanBarcodeAndSearch(file){
  if(!file)return;
  showLoad("Leyendo código de barras...");
  const code=await scanBarcodeFromImage(file);
  hideLoad();
  if(code){
    LAST_SCANNED_BARCODE=code;el("scanQ").value=code;el("scanInfo").innerHTML=`<div class="barcode-ok"><b>Código detectado:</b> ${safe(code)} <button class="btn small" onclick="copyText('${safe(code)}')">Copiar</button></div>`;
    await scanSearch();
  }else{
    el("scanInfo").innerHTML=`<div class="barcode-bad"><b>No se leyó el código automático.</b><br>En algunos celulares/navegadores el lector nativo no está disponible. Puedes escribir el código manualmente o tomar una foto más enfocada.</div>`;
  }
}
async function detectProductFile(file,source){
  if(!file)return;
  const maybeBarcode=await scanBarcodeFromImage(file);
  if(maybeBarcode){LAST_SCANNED_BARCODE=maybeBarcode;el("scanQ").value=maybeBarcode}
  let fd=new FormData();fd.append("client_id",CLIENT.id);fd.append("image",file);
  showLoad(source==="camera"?"Analizando foto tomada...":"Analizando archivo...");
  const r=await api("/api/products/detect",{method:"POST",body:fd});
  hideLoad();
  let left=`<div class="card"><h3>${source==="camera"?"Foto tomada":"Archivo subido"}</h3>${r.captured_image?`<img class="compare-img" src="${absUrl(r.captured_image)}">`:""}${maybeBarcode?`<div class="barcode-ok"><b>Código leído:</b> ${safe(maybeBarcode)}</div>`:""}</div>`;
  let right="";
  if(r.ok&&r.similar&&r.product){
    const p=r.product;
    right=`<div class="card"><h3>Producto detectado</h3>${p.matched_image_url?`<img class="compare-img" src="${absUrl(p.matched_image_url)}">`:""}<hr>${productFoundHtml(p)}${maybeBarcode&&(!p.barcode||p.barcode!==maybeBarcode)?`<div class="barcode-ok"><b>Vincular código al producto:</b> ${safe(maybeBarcode)}<br><button class="primary small" onclick="linkBarcode(${p.id},'${safe(maybeBarcode)}')">Vincular código de barras</button></div>`:""}</div>`;
    el("scanQ").value=p.barcode||p.internal_code||productName(p);
  }else if(maybeBarcode){
    right=`<div class="card"><h3>No coincidió por imagen</h3><p>Pero se detectó código de barras. Buscando producto por código...</p></div>`;
    el("scanResult").innerHTML=`<div class="grid2">${left}${right}</div>`;
    await scanSearch();
    return;
  }else{
    right=`<div class="card"><h2>No hay coincidencia</h2><p class="muted">Si es un producto nuevo, regístralo con fotos y código de barras para entrenar el sistema.</p><button class="primary" onclick="newProductForm()">Crear producto nuevo</button></div>`;
  }
  el("scanResult").innerHTML=`<div class="grid2">${left}${right}</div>`;
}
async function scanSearch(){const q=el("scanQ").value.trim();if(!q)return toast("Escribe o escanea un dato","bad");showLoad("Buscando producto...");const r=await api(`/api/products/search?client_id=${CLIENT.id}&q=${encodeURIComponent(q)}`);hideLoad();el("scanResult").innerHTML=(r.products||[]).map(p=>`<div class="card">${productFoundHtml(p)}${LAST_SCANNED_BARCODE&&(!p.barcode||p.barcode!==LAST_SCANNED_BARCODE)?`<div class="barcode-ok"><b>Código escaneado:</b> ${safe(LAST_SCANNED_BARCODE)}<br><button class="primary small" onclick="linkBarcode(${p.id},'${safe(LAST_SCANNED_BARCODE)}')">Vincular este código al producto</button></div>`:""}</div>`).join("")||"<div class='card'>No encontrado. Puedes registrarlo como producto nuevo.</div>"}

function clientCredits(){setTitle("Créditos / Cuentas","Módulo de fiado");el("view").innerHTML=`<div class="card"><h1>Créditos / Cuentas</h1><p>La lógica del backend se mantiene. Para esta corrección se priorizó cámara, galería y código de barras.</p></div>`}
async function clientPayments(){setTitle("Pagos / QR","Medios de pago");const r=await api(`/api/payments?client_id=${CLIENT.id}`);el("view").innerHTML=`<div class="card"><h1>Pagos / QR</h1>${(r.payments||[]).map(qrCard).join("")||"<p>Aún no tienes QR guardado.</p>"}<h2>Agregar medio</h2>${paymentFormHtml()}<button class="primary" onclick="savePayment()">Guardar medio de pago</button></div>`}
function clientExpirations(){setTitle("Vencimientos","Productos por vencer");const list=PRODUCTS.filter(p=>p.expiration_date);el("view").innerHTML=`<div class="card"><h1>Vencimientos</h1>${list.map(p=>`<div class="list-card"><b>${safe(p.name)}</b><p>Vence: ${safe(p.expiration_date)}</p></div>`).join("")||"No hay vencimientos registrados."}</div>`}
</script>
</body>
</html>
