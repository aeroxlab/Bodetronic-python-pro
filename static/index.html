<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Bodetronic Python</title><style>body{font-family:Arial;margin:0;background:#ECFEFF;color:#101827}.box,.card{background:white;border-radius:22px;padding:18px;margin:14px;box-shadow:0 14px 34px #0f172a14}input,button{padding:12px;border-radius:14px;border:1px solid #d7eef0;margin:5px}button{font-weight:800;border:0;background:#00A6A6;color:white}.dark{background:#0F172A}.green{background:#22c55e}.red{background:#ef4444}.app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}.side{background:#0F172A;color:white;padding:16px}.side button{display:block;width:100%;margin:6px 0;background:#152238;text-align:left}.hide{display:none}.price{font-size:28px;color:#00A6A6;font-weight:900}.prod{display:grid;grid-template-columns:80px 1fr auto;gap:12px;align-items:center;border:1px solid #d7eef0;border-radius:18px;padding:10px;margin:10px}.img{width:80px;height:80px;background:#e8eef5;border-radius:16px;display:grid;place-items:center;overflow:hidden}.img img{width:100%;height:100%;object-fit:cover}@media(max-width:800px){.app{display:block}}</style></head><body><section id="login" style="min-height:100vh;display:grid;place-items:center"><div class="box" style="width:min(420px,90%)"><h1>Bodetronic</h1><p>Python Pro</p><div id="msg"></div><input id="u" placeholder="Usuario"><input id="p" type="password" placeholder="Contrasena"><button style="width:100%" onclick="login()">Ingresar</button></div></section><section id="app" class="app hide"><aside class="side"><h2>Bodetronic</h2><p id="role"></p><div id="menu"></div><button onclick="location.reload()">Salir</button></aside><main id="view"></main></section><script>
let T='',R='',CLIENT=null,BUNDLE=null,CART=[];const API='';async function api(path,opt={}){opt.headers=opt.headers||{};if(!(opt.body instanceof FormData))opt.headers['Content-Type']='application/json';if(T)opt.headers.Authorization='Bearer '+T;let r=await fetch(path,opt);return r.json()}function el(x){return document.getElementById(x)}function money(n){return Number(n||0).toFixed(2)}async function login(){let r=await api('/api/auth/login',{method:'POST',body:JSON.stringify({username:el('u').value,password:el('p').value})});if(!r.ok){el('msg').innerHTML='<p style="color:red">'+r.error+'</p>';return}T=r.token;R=r.role;CLIENT=r.client;el('login').classList.add('hide');el('app').classList.remove('hide');el('role').textContent=R==='admin'?'Admin':'Cliente';R==='admin'?adminMenu():clientStart()}function adminMenu(){el('menu').innerHTML='<button onclick="dash()">Dashboard</button><button onclick="crm()">Clientes CRM</button><button onclick="newClient()">Crear cliente</button>';dash()}async function dash(){let r=await api('/api/admin/data');el('view').innerHTML='<div class="card"><h2>Dashboard</h2><div class="price">Clientes: '+r.stats.clients+'</div><div class="price">Productos: '+r.stats.products+'</div></div>'}async function crm(){let r=await api('/api/admin/data');el('view').innerHTML='<div class="card"><h2>Clientes CRM</h2>'+r.clients.map(c=>'<div class="card"><b>'+c.business_name+'</b><p>'+c.owner_name+' | '+c.whatsapp+'</p><p>Usuario: '+(c.access.username||'')+' | Clave: '+(c.access.raw_hint||'')+'</p><button onclick="design('+c.id+')">Diseno</button></div>').join('')+'</div>'}function newClient(){el('view').innerHTML='<div class="card"><h2>Crear cliente</h2><input id="bn" placeholder="Negocio"><input id="ow" placeholder="Dueno"><input id="dni" placeholder="DNI/RUC"><input id="wsp" placeholder="WhatsApp"><label><input id="bodega" type="checkbox"> Bodega</label><label><input id="pos" type="checkbox"> Punto de venta</label><label><input id="credits" type="checkbox"> Creditos</label><button onclick="saveClient()">Guardar</button></div>'}async function saveClient(){let r=await api('/api/admin/clients',{method:'POST',body:JSON.stringify({business_name:el('bn').value,owner_name:el('ow').value,dni_ruc:el('dni').value,whatsapp:el('wsp').value,services:{bodega:el('bodega').checked,pos:el('pos').checked,credits:el('credits').checked}})});alert('Usuario: '+r.username+' Clave: '+r.password);crm()}function design(id){el('view').innerHTML='<div class="card"><h2>Diseno cliente</h2><input id="logo" placeholder="Logo URL"><input id="tit" placeholder="Titulo"><textarea id="ban" placeholder="Publicidad"></textarea><textarea id="spo" placeholder="Sponsor"></textarea><button onclick="saveDesign('+id+')">Guardar</button></div>'}async function saveDesign(id){await api('/api/admin/clients/'+id+'/design',{method:'PUT',body:JSON.stringify({logo_url:el('logo').value,title:el('tit').value,banner_text:el('ban').value,sponsor_text:el('spo').value})});alert('Guardado')}
async function clientStart(){el('menu').innerHTML='<button onclick="home()">Inicio</button><button onclick="products()">Productos</button><button onclick="scanner()">Scanner</button><button onclick="pos()">Punto de venta</button><button onclick="credits()">Creditos</button>';await loadBundle();home()}async function loadBundle(){BUNDLE=await api('/api/client/bundle')}function home(){el('view').innerHTML='<div class="card"><h2>'+BUNDLE.client.business_name+'</h2><p>'+(BUNDLE.design.banner_text||'Bienvenido')+'</p></div>'}function prodCard(p){return '<div class="prod"><div class="img">'+(p.image_url?'<img src="'+p.image_url+'">':'IMG')+'</div><div><b>'+p.name+'</b><p>'+p.brand+' | '+p.internal_code+'</p><div class="price">S/ '+money(p.sale_price)+'</div><p>Stock: '+p.stock+'</p></div><button class="green" onclick="sell('+p.id+')">Vender</button></div>'}function products(){el('view').innerHTML='<div class="card"><h2>Productos</h2><button onclick="newProduct()">Agregar</button>'+BUNDLE.products.map(prodCard).join('')+'</div>'}function newProduct(){el('view').innerHTML='<div class="card"><h2>Agregar producto</h2><input id="pn" placeholder="Nombre"><input id="pb" placeholder="Marca"><input id="bar" placeholder="Codigo barras"><input id="st" type="number" placeholder="Stock"><input id="real" type="number" placeholder="Precio real"><input id="sale" type="number" placeholder="Precio venta"><input id="img" type="file"><button onclick="saveProduct()">Guardar</button></div>'}async function saveProduct(){let f=new FormData();f.append('client_id',BUNDLE.client.id);f.append('name',el('pn').value);f.append('brand',el('pb').value);f.append('barcode',el('bar').value);f.append('stock',el('st').value||0);f.append('real_price',el('real').value||0);f.append('sale_price',el('sale').value||0);if(el('img').files[0])f.append('image',el('img').files[0]);await api('/api/products',{method:'POST',body:f});await loadBundle();products()}function scanner(){el('view').innerHTML='<div class="card"><h2>Scanner / comparar</h2><input id="q" placeholder="Nombre, codigo o barras"><button onclick="searchP()">Buscar</button><input id="det" type="file"><button class="dark" onclick="detectP()">Comparar foto</button><div id="res"></div></div>'}async function searchP(){let r=await api('/api/products/search?client_id='+BUNDLE.client.id+'&q='+encodeURIComponent(el('q').value));el('res').innerHTML=r.ok?prodCard(r.product):'No encontrado'}async function detectP(){let f=new FormData();f.append('client_id',BUNDLE.client.id);f.append('image',el('det').files[0]);let r=await api('/api/products/detect',{method:'POST',body:f});el('res').innerHTML=r.ok?'<div class="card"><h3>Foto tomada</h3><img src="'+r.captured_image+'" style="width:100%"></div><div class="card"><h3>Producto similar</h3>'+prodCard(r.product)+'</div>':'No se encontro similar'}function sell(id){CART.push({product_id:id,quantity:1});alert('Agregado')}function pos(){el('view').innerHTML='<div class="card"><h2>Punto de venta</h2><button onclick="finishSale()">Pagar</button>'+BUNDLE.products.map(prodCard).join('')+'</div>'}async function finishSale(){let r=await api('/api/sales',{method:'POST',body:JSON.stringify({client_id:BUNDLE.client.id,items:CART})});alert('Total S/ '+r.total);CART=[];await loadBundle();pos()}function credits(){el('view').innerHTML='<div class="card"><h2>Creditos</h2><p>Modulo backend listo para detallar cuentas.</p></div>'}</script></body></html>
